<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Squishbook — Criar meu livro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--azul:#378ADD;--azul-esc:#185FA5;--azul-deep:#0C447C;--azul-cl:#B5D4F4;--azul-pal:#E6F1FB;--roxo:#AFA9EC;--roxo-esc:#7F77DD;--rosa:#ED93B1;--rosa-esc:#D4537E;--verde:#1D9E75;--texto:#1a1a2e;--texto-sec:#5a5a7a;--cinza:#f7fafd;--borda:#dbeeff;--erro:#e24b4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;color:var(--texto);background:var(--cinza);min-height:100vh}
.header{background:linear-gradient(135deg,#0C447C,#185FA5,#7F77DD);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(12,68,124,.3)}
.header-logo{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:white;text-decoration:none}
.header-logo span{color:rgba(255,255,255,.55);font-weight:300}
.progress-wrap{flex:1;display:flex;justify-content:center}
.progress-steps{display:flex;align-items:center;gap:4px}
.ps{display:flex;align-items:center;gap:4px}
.ps-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;border:2px solid rgba(255,255,255,.3);color:rgba(255,255,255,.6);background:rgba(255,255,255,.1);transition:all .3s}
.ps-dot.active{background:white;border-color:white;color:var(--azul-deep)}
.ps-dot.done{background:var(--verde);border-color:var(--verde);color:white}
.ps-line{width:18px;height:2px;background:rgba(255,255,255,.2);border-radius:2px;transition:background .3s}
.ps-line.done{background:var(--verde)}
.main{max-width:720px;margin:0 auto;padding:40px 20px 80px}
.card{background:#fff;border-radius:24px;padding:40px 44px;border:1.5px solid var(--borda);animation:slideIn .35s cubic-bezier(.34,1.2,.64,1) both;box-shadow:0 4px 24px rgba(12,68,124,.07)}
@keyframes slideIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
.slabel{font-size:.73rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--azul);margin-bottom:8px}
.stit{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;color:var(--azul-deep);margin-bottom:8px;line-height:1.25}
.sdesc{font-size:.95rem;color:var(--texto-sec);line-height:1.65;margin-bottom:26px}

/* PERSONAGENS */
.pers-lista{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.pers-card{border:2px solid var(--borda);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s;position:relative}
.pers-card:hover{border-color:var(--azul-cl)}
.pers-card.premium{border-color:var(--rosa);background:rgba(237,147,177,.04)}
.pers-foto-wrap{position:relative;flex-shrink:0}
.pers-foto{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2.5px solid var(--azul-cl);display:block}
.pers-placeholder{width:68px;height:68px;border-radius:50%;background:var(--azul-pal);border:2.5px dashed var(--azul-cl);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:background .2s}
.pers-placeholder:hover{background:#d4e8fa}
.pers-edit-btn{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--azul-esc);border:2px solid #fff;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.pers-info{flex:1;min-width:0}
.pers-info label{font-size:.8rem;font-weight:700;color:var(--texto-sec);margin-bottom:5px;display:block}
.pers-info input{width:100%;border:1.5px solid var(--borda);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:.93rem;color:var(--texto);outline:none;transition:border-color .2s}
.pers-info input:focus{border-color:var(--azul)}
.pers-role select{width:100%;border:1.5px solid var(--borda);border-radius:10px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--texto-sec);outline:none;background:#fff;cursor:pointer;margin-top:7px}
.pers-remove{background:none;border:none;color:#ccc;font-size:1rem;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s;flex-shrink:0;align-self:flex-start}
.pers-remove:hover{color:var(--erro)}
.badge-free{position:absolute;top:10px;right:36px;background:var(--verde);color:white;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:20px}
.badge-pago{position:absolute;top:10px;right:36px;background:var(--rosa-esc);color:white;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:20px}
.btn-add{display:flex;align-items:center;gap:10px;padding:13px 18px;border:2px dashed var(--azul-cl);border-radius:14px;background:var(--azul-pal);color:var(--azul-esc);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;transition:background .2s,border-color .2s;margin-bottom:8px}
.btn-add:hover{background:#d4e8fa;border-color:var(--azul)}
input[type="file"]{display:none}

/* IDADE BOX */
.idade-box{background:linear-gradient(135deg,var(--azul-pal),rgba(175,169,236,.15));border:1.5px solid var(--azul-cl);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.idade-box label{font-size:.85rem;font-weight:800;color:var(--azul-deep);margin-bottom:10px;display:block}
.idade-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.idade-input{width:140px;border:1.5px solid var(--azul-cl);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--texto);outline:none;transition:border-color .2s;background:white}
.idade-input:focus{border-color:var(--azul)}
.estilo-hint{font-size:.85rem;font-weight:700;padding:6px 14px;border-radius:20px;display:none}
.estilo-hint.visual{background:rgba(212,83,126,.12);color:var(--rosa-esc);display:inline-block}
.estilo-hint.narrativo{background:rgba(127,119,221,.12);color:var(--roxo-esc);display:inline-block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:24px;padding:36px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-emoji{font-size:3rem;display:block;margin-bottom:16px}
.modal h3{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--azul-deep);margin-bottom:10px}
.modal p{font-size:.93rem;color:var(--texto-sec);line-height:1.65;margin-bottom:20px}
.modal-preco{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--rosa-esc);margin-bottom:6px}
.modal-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.modal-btn-sim{padding:13px 28px;border-radius:50px;background:linear-gradient(135deg,var(--rosa-esc),var(--roxo-esc));color:white;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:transform .2s}
.modal-btn-sim:hover{transform:scale(1.03)}
.modal-btn-nao{padding:13px 24px;border-radius:50px;background:white;color:var(--texto-sec);font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;border:2px solid var(--borda);cursor:pointer}

/* OPCOES */
.opcoes{display:flex;flex-direction:column;gap:12px}
.opcao{border:2px solid var(--borda);border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:14px}
.opcao:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.opcao.selected{border-color:var(--azul-esc);background:var(--azul-pal)}
.opcao-icon{font-size:1.6rem;width:44px;height:44px;background:var(--cinza);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opcao.selected .opcao-icon{background:var(--azul-cl)}
.opcao-info h4{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:var(--azul-deep);margin-bottom:3px}
.opcao-info p{font-size:.85rem;color:var(--texto-sec)}
.roteiros{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.rot-card{border:2px solid var(--borda);border-radius:14px;padding:14px 12px;cursor:pointer;transition:border-color .2s,background .2s;text-align:center}
.rot-card:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.rot-card.selected{border-color:var(--roxo-esc);background:rgba(175,169,236,.12)}
.rot-emoji{font-size:1.7rem;display:block;margin-bottom:6px}
.rot-card h4{font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;color:var(--azul-deep);margin-bottom:3px}
.rot-card p{font-size:.77rem;color:var(--texto-sec)}

/* ESTILO VISUAL vs NARRATIVO */
.estilo-wrap{margin-top:20px}
.estilo-titulo{font-size:.85rem;font-weight:800;color:var(--texto);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.estilo-auto-badge{background:linear-gradient(135deg,var(--azul-esc),var(--roxo-esc));color:white;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px}
.estilo-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.estilo-card{border:2px solid var(--borda);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center}
.estilo-card:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.estilo-card.visual.selected{border-color:var(--rosa-esc);background:rgba(237,147,177,.1)}
.estilo-card.narrativo.selected{border-color:var(--roxo-esc);background:rgba(127,119,221,.1)}
.estilo-emoji{font-size:2rem;display:block;margin-bottom:8px}
.estilo-card h4{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;color:var(--azul-deep);margin-bottom:4px}
.estilo-card p{font-size:.78rem;color:var(--texto-sec);line-height:1.5}
.badge-visual{background:rgba(212,83,126,.15);color:var(--rosa-esc);font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:8px}
.badge-narrativo{background:rgba(127,119,221,.15);color:var(--roxo-esc);font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:8px}

/* INPUTS */
.campo-label{display:block;font-size:.88rem;font-weight:700;color:var(--texto);margin-bottom:8px}
textarea,input[type="text"],input[type="email"]{width:100%;border:2px solid var(--borda);border-radius:12px;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--texto);resize:vertical;transition:border-color .2s;background:#fff;outline:none}
textarea{min-height:110px}
textarea:focus,input:focus{border-color:var(--azul)}
.campo-group{margin-bottom:18px}
.campo-hint{font-size:.8rem;color:var(--texto-sec);margin-top:6px}
.contador{font-size:.8rem;color:var(--texto-sec);text-align:right;margin-top:4px}

/* LOADING */
.loading-wrap{text-align:center;padding:44px 0}
.loading-spinner{width:52px;height:52px;border:4px solid var(--azul-cl);border-top-color:var(--azul-esc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:var(--azul-deep);margin-bottom:6px}
.loading-sub{font-size:.88rem;color:var(--texto-sec)}
.loading-estilo{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:8px 18px;border-radius:50px;font-size:.82rem;font-weight:700}
.loading-estilo.visual{background:rgba(212,83,126,.12);color:var(--rosa-esc)}
.loading-estilo.narrativo{background:rgba(127,119,221,.12);color:var(--roxo-esc)}

/* TELA DE REVISAO */
.revisao-titulo{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--azul-deep);margin:28px 0 14px;display:flex;align-items:center;gap:10px}
.revisao-titulo:first-child{margin-top:0}
.revisao-sep{border:none;border-top:1.5px solid var(--borda);margin:28px 0}

/* AVATARES SQUISH */
.avatares-grid{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px}
.avatar-item{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:90px}
.avatar-foto-wrap{position:relative;width:80px;height:80px}
.avatar-foto-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2.5px solid var(--azul-cl)}
.avatar-squish-wrap{width:80px;height:80px;border-radius:50%;overflow:hidden;border:2.5px solid var(--borda)}
.avatar-nome{font-size:.8rem;font-weight:700;color:var(--azul-deep);text-align:center}
.avatar-papel{font-size:.7rem;color:var(--texto-sec);text-align:center}
.avatar-tabs{display:flex;gap:6px;margin-bottom:12px}
.avatar-tab{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid var(--borda);background:white;color:var(--texto-sec);transition:all .2s}
.avatar-tab.active{background:var(--azul-esc);border-color:var(--azul-esc);color:white}

/* PREVIEW LIVRO */
.livro-preview{border-radius:20px;padding:22px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.livro-preview.visual{background:linear-gradient(135deg,#ffe8f3,#f0e8ff)}
.livro-preview.narrativo{background:linear-gradient(135deg,#e6f1fb,#e8e5ff)}
.lp-emoji{font-size:2rem;display:block;margin-bottom:8px;position:relative}
.lp-titulo{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--azul-deep);margin-bottom:4px;position:relative}
.lp-sub{font-size:.84rem;color:var(--texto-sec);position:relative}
.lp-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:20px;font-size:.73rem;font-weight:800;position:relative}
.lp-badge.visual{background:rgba(212,83,126,.15);color:var(--rosa-esc)}
.lp-badge.narrativo{background:rgba(127,119,221,.15);color:var(--roxo-esc)}

/* REGENERAR */
.regen-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:var(--cinza);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.regen-info{font-size:.85rem;color:var(--texto-sec)}
.regen-info strong{color:var(--azul-deep)}
.regen-btn{padding:8px 18px;border-radius:50px;background:white;border:1.5px solid var(--borda);font-family:'Baloo 2',cursive;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--azul-esc);transition:all .2s;display:flex;align-items:center;gap:6px}
.regen-btn:hover:not(:disabled){border-color:var(--azul);background:var(--azul-pal)}
.regen-btn:disabled{opacity:.4;cursor:not-allowed}
.tentativas-dots{display:flex;gap:4px}
.tentativa-dot{width:8px;height:8px;border-radius:50%;background:var(--verde)}
.tentativa-dot.usada{background:var(--borda)}

/* PAGINAS VISUAIS */
.pags-visuais{display:flex;flex-direction:column;gap:14px;margin-bottom:4px}
.pv{border:1.5px solid var(--borda);border-radius:16px;overflow:hidden}
.pv-header{padding:12px 18px;display:flex;align-items:center;gap:12px;background:var(--cinza)}
.pv-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--rosa-esc),var(--roxo-esc));color:white;font-size:.78rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pv-tit{font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;color:var(--azul-deep)}
.pv-body{padding:16px 18px;display:flex;align-items:flex-start;gap:16px}
.pv-ilus{width:80px;height:80px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.pv-texto{font-size:.95rem;color:var(--texto);line-height:1.75;flex:1}

/* CAPITULOS */
.caps{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.cap{border:1.5px solid var(--borda);border-radius:16px;overflow:hidden}
.cap-header{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s}
.cap-header:hover{background:var(--azul-pal)}
.cap-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.cap-inicio .cap-badge{background:rgba(175,169,236,.3)}
.cap-meio .cap-badge{background:rgba(237,147,177,.3)}
.cap-fim .cap-badge{background:rgba(29,158,117,.2)}
.cap-titulo{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;color:var(--azul-deep);flex:1}
.cap-arrow{color:var(--texto-sec);font-size:.78rem;transition:transform .25s}
.cap-arrow.open{transform:rotate(180deg)}
.cap-body{padding:0 18px 18px;font-size:.93rem;color:var(--texto);line-height:1.8;white-space:pre-line;display:none}
.cap-body.open{display:block}

/* FORMATOS */
.formatos{display:flex;flex-direction:column;gap:12px}
.fmt-card{border:2px solid var(--borda);border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .2s,background .2s}
.fmt-card:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.fmt-card.selected{border-color:var(--azul-esc);background:var(--azul-pal)}
.fmt-card.destaque{border-color:var(--rosa)}
.fmt-card.destaque.selected{background:rgba(237,147,177,.1);border-color:var(--rosa-esc)}
.fmt-icon{font-size:1.6rem;width:48px;height:48px;background:var(--cinza);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fmt-info{flex:1}
.fmt-info h4{font-family:'Baloo 2',cursive;font-size:.98rem;font-weight:700;color:var(--azul-deep);margin-bottom:2px}
.fmt-info p{font-size:.82rem;color:var(--texto-sec)}
.fmt-preco{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:var(--azul-esc)}
.badge-pop{background:var(--rosa);color:#fff;font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}

/* RESUMO */
.resumo-lista{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.resumo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--cinza);border-radius:10px;font-size:.9rem}
.resumo-item strong{color:var(--azul-deep);min-width:100px;font-size:.84rem}
.resumo-item span{color:var(--texto-sec)}
.resumo-preco{font-family:'Baloo 2',cursive;color:var(--azul-esc);font-weight:800;font-size:1.1rem}

/* BOTOES */
.btn-row{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
.btn{padding:15px 30px;border-radius:50px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;cursor:pointer;border:none;transition:transform .18s,box-shadow .18s,opacity .18s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn:hover:not(:disabled){transform:translateY(-2px) scale(1.02)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--azul-esc),var(--roxo-esc));color:#fff;box-shadow:0 6px 20px rgba(24,95,165,.28);flex:1;justify-content:center}
.btn-primary:hover:not(:disabled){box-shadow:0 10px 28px rgba(24,95,165,.38)}
.btn-secondary{background:#fff;color:var(--texto-sec);border:2px solid var(--borda);flex-shrink:0}
.btn-secondary:hover:not(:disabled){border-color:var(--azul-cl);color:var(--azul-esc)}
.btn-sucesso{background:linear-gradient(135deg,var(--verde),#0F6E56);color:#fff;box-shadow:0 6px 20px rgba(29,158,117,.28);flex:1;justify-content:center}
.erro-msg{background:#fcebeb;border:1.5px solid #f09595;border-radius:10px;padding:11px 15px;font-size:.86rem;color:var(--erro);margin-top:10px;display:none}
.erro-msg.show{display:block}
.sucesso-wrap{text-align:center;padding:16px 0}
.pos-wrap{padding:4px 0}
.pos-secao{background:var(--azul-pal);border:1.5px solid var(--azul-cl);border-radius:16px;padding:20px;margin-bottom:16px}
.pos-secao h3{font-family:"Baloo 2",cursive;font-size:1rem;font-weight:700;color:var(--azul-deep);margin-bottom:12px}
.envio-ops{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}

.pl-capa{background:linear-gradient(135deg,var(--azul-deep),var(--roxo-esc));padding:32px 24px;text-align:center;position:relative}

.pl-pg-texto{font-size:.88rem;color:var(--texto);line-height:1.75;font-style:italic}
.pl-pg-loading{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--texto-sec)}
.pl-pg-loading .mini-spin{width:16px;height:16px;border:2px solid var(--azul-cl);border-top-color:var(--azul-esc);border-radius:50%;animation:spin .7s linear infinite}
.pl-rodape{background:linear-gradient(135deg,var(--azul-deep),var(--roxo-esc));padding:20px;text-align:center}

.pl-rodape-ass{font-family:"Baloo 2",cursive;color:rgba(255,255,255,.5);font-size:.82rem}
.feedback-wrap{background:#fff8f0;border:1.5px solid #fddcb5;border-radius:12px;padding:14px;margin-top:10px}
.feedback-wrap p{font-size:.82rem;color:#633806;margin-bottom:8px}
.rodadas-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.rodada-dot{width:10px;height:10px;border-radius:50%;background:var(--verde)}

.btn-ajustar{padding:8px 18px;border-radius:50px;background:white;border:1.5px solid #fddcb5;font-family:"Baloo 2",cursive;font-size:.85rem;font-weight:700;cursor:pointer;color:#854F0B;transition:all .2s}
.btn-ajustar:hover:not(:disabled){border-color:#854F0B;background:#FEF0A0}
.btn-ajustar:disabled{opacity:.4;cursor:not-allowed}
.gerando-cenas{text-align:center;padding:32px 20px}
.gerando-etapas{display:flex;flex-direction:column;gap:8px;margin:16px 0;text-align:left}
.et{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--cinza);border-radius:10px;font-size:.85rem;color:var(--texto-sec)}
.et.ativa{background:var(--azul-pal);color:var(--azul-esc);font-weight:700}
.et.feita{background:#e1f5ee;color:var(--verde);font-weight:700}
.et-ico{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;background:var(--borda)}
.et.feita .et-ico{background:var(--verde);color:white}
.et.ativa .et-ico{background:var(--azul-esc);color:white}
.sucesso-emoji{font-size:4rem;display:block;margin-bottom:18px}
.sucesso-titulo{font-family:'Baloo 2',cursive;font-size:1.7rem;font-weight:800;color:var(--azul-deep);margin-bottom:12px}

<body>
<header class="header">
  <a href="index.html" class="header-logo">Squish<span>book</span></a>
  <div class="progress-wrap">
    <div class="progress-steps" id="progressSteps"></div>
  </div>
</header>
<main class="main">
  <div class="card" id="cardContent"></div>
</main>
<script>
var PRECO_EXTRA = 9.90;
var MAX_REGEN = 3;
var nextId = 2;

var ST = {
  step: 1,
  personagens: [{id:1, nome:'', papel:'protagonista', fotoUrl:null, avatarUrl:null, avatarErro:false}],
  idadeCrianca: '',
  estiloAuto: null,
  estiloFinal: null,
  extras: 0,
  tipoHistoria: null, roteiro: null, historiaConta: '',
  respostas: {},
  historia: {titulo:'', emoji:'', inicio:'', meio:'', fim:'', paginas:[]},
  regenHistoria: 0,
  formato: null, email: ''
};

var STEPS = [
  {num:1,label:'Personagens'},
  {num:2,label:'Historia'},
  {num:3,label:'Detalhes'},
  {num:4,label:'Criacao'},
  {num:5,label:'Revisao'},
  {num:6,label:'Formato'},
  {num:7,label:'Pedido'}
];

var PAPEIS = [
  {v:'protagonista',l:'Protagonista'},
  {v:'familiar',l:'Familiar'},
  {v:'amigo',l:'Amigo especial'},
  {v:'pet',l:'Bichinho'},
  {v:'outro',l:'Outro'}
];

var PEMAP = {protagonista:'estrela',familiar:'coracao',amigo:'maos',pet:'pata',outro:'brilho'};
var PEMAPC = {protagonista:'STAR',familiar:'HRT',amigo:'HAND',pet:'PAW',outro:'STAR'};
var PCORES = {protagonista:'#378ADD',familiar:'#D4537E',amigo:'#7F77DD',pet:'#1D9E75',outro:'#E8893C'};

var ROTEIROS = [
  {id:'aventura',emoji:'MAP',ec:'\u{1F5FA}',t:'Grande Aventura',d:'Jornada epica cheia de surpresas'},
  {id:'amizade',emoji:'HAND',ec:'\u{1F91D}',t:'Amigos Para Sempre',d:'Uma historia de amizade'},
  {id:'familia',emoji:'HRT',ec:'\u2764',t:'Familia Unida',d:'O amor que une a familia'},
  {id:'magia',emoji:'STAR',ec:'\u2728',t:'Mundo Magico',d:'Fantasia e encantamento'},
  {id:'animal',emoji:'LION',ec:'\u{1F981}',t:'Amigo Animal',d:'Uma crianca e seu animal especial'},
  {id:'sonho',emoji:'MOON',ec:'\u{1F319}',t:'O Grande Sonho',d:'Coragem para realizar um sonho'},
  {id:'terror',emoji:'GHOST',ec:'\u{1F47B}',t:'Noite de Terror',d:'Assustador, engracado e cheio de sustos!'}
];

var FORMATOS = [
  {id:'digital',ec:'\u{1F4F1}',t:'Digital',d:'PDF por email. Imediato!',p:49,dest:false},
  {id:'impresso',ec:'\u{1F4D7}',t:'Impresso',d:'Livro fisico entregue em casa',p:99,dest:true},
  {id:'capa_dura',ec:'\u{1F4D8}',t:'Capa Dura',d:'Encadernacao especial, para sempre!',p:179,dest:false}
];

var PG_EC = {
  aventura:['\u{1F305}','\u{1F5FA}','\u26A1','\u{1F3C6}','\u{1F31F}','\u{1F31F}'],
  amizade:['\u{1F338}','\u{1F91D}','\u{1F494}','\u{1F308}','\u2764','\u2764'],
  familia:['\u{1F3E0}','\u2764','\u{1F381}','\u2728','\u{1F970}','\u{1F970}'],
  magia:['\u{1F319}','\u{1F9DA}','\u26A1','\u{1FA84}','\u2728','\u2728'],
  animal:['\u{1F333}','\u{1F43E}','\u{1F495}','\u{1F3C3}','\u{1F31F}','\u{1F31F}'],
  sonho:['\u{1F319}','\u{1F4AD}','\u26A1','\u{1F4AA}','\u{1F31F}','\u{1F31F}'],
  terror:['\u{1F311}','\u{1F47B}','\u26A1','\u{1F631}','\u{1F31F}','\u{1F31F}']
};

var PG_CORES = [
  'linear-gradient(135deg,#B5D4F4,#C8C5F5)',
  'linear-gradient(135deg,#FDDCB5,#F4A8C0)',
  'linear-gradient(135deg,#A8E6CF,#FEF0A0)',
  'linear-gradient(135deg,#C8C5F5,#F4A8C0)',
  'linear-gradient(135deg,#B5D4F4,#A8E6CF)',
  'linear-gradient(135deg,#E8DCFF,#FFD6E8)'
];

function fmtMoney(n){ return n.toFixed(2).replace('.',','); }

function prog(){
  var html = '';
  for(var i=0;i<STEPS.length;i++){
    var s = STEPS[i];
    var c = s.num < ST.step ? 'done' : s.num === ST.step ? 'active' : '';
    var ic = s.num < ST.step ? '\u2713' : s.num;
    var lc = s.num < ST.step ? 'done' : '';
    html += '<div class="ps"><div class="ps-dot '+c+'" title="'+s.label+'">'+ic+'</div>';
    if(i < STEPS.length-1) html += '<div class="ps-line '+lc+'"></div>';
    html += '</div>';
  }
  document.getElementById('progressSteps').innerHTML = html;
}

function render(){
  prog();
  var c = document.getElementById('cardContent');
  c.style.animation='none'; c.offsetHeight; c.style.animation='';
  var fns = [null,s1,s2,s3,s4,s5,s6,s7,sfim];
  if(fns[ST.step]) fns[ST.step](c);
  window.scrollTo({top:0,behavior:'smooth'});
}

// S1: PERSONAGENS + IDADE
function s1(c){
  c.innerHTML = '<div class="slabel">Passo 1 de 6</div>'
    + '<h2 class="stit">Personagens e idade</h2>'
    + '<p class="sdesc">Adicione os personagens e a idade da crianca. Os 4 primeiros sao gratis. <strong style="color:var(--rosa-esc)">A partir do 5\u00ba: R$ '+fmtMoney(PRECO_EXTRA)+' por personagem extra.</strong></p>'
    + '<div class="idade-box">'
    + '<label class="campo-label">\u{1F382} Quantos anos a crianca tem?</label>'
    + '<div class="idade-row">'
    + '<input class="idade-input" type="text" placeholder="Ex: 4, 6, 10..." value="'+ST.idadeCrianca+'" oninput="ST.idadeCrianca=this.value;atualizarHint(this.value)"/>'
    + '<span class="estilo-hint" id="estiloHint"></span>'
    + '</div></div>'
    + '<div class="pers-lista" id="pLista"></div>'
    + '<button class="btn-add" id="btnAdd" onclick="tentarAdd()">\u2795 Adicionar personagem</button>'
    + '<div class="erro-msg" id="erroP">Informe o nome da crianca e a idade para continuar.</div>'
    + '<div class="btn-row"><button class="btn btn-primary" onclick="av1()">Continuar \u2192</button></div>';
  renderPers();
  atualizarHint(ST.idadeCrianca);
}

function atualizarHint(val){
  var n = parseInt(val);
  var h = document.getElementById('estiloHint'); if(!h) return;
  h.className='estilo-hint';
  if(!n){ h.textContent=''; return; }
  if(n<=7){
    ST.estiloAuto='visual';
    if(!ST.estiloFinal) ST.estiloFinal='visual';
    h.className='estilo-hint visual';
    h.textContent='\u{1F3A8} Estilo Visual sugerido';
  } else {
    ST.estiloAuto='narrativo';
    if(!ST.estiloFinal) ST.estiloFinal='narrativo';
    h.className='estilo-hint narrativo';
    h.textContent='\u{1F4DA} Estilo Narrativo sugerido';
  }
}

function renderPers(){
  var l = document.getElementById('pLista'); if(!l) return;
  var html = '';
  for(var i=0;i<ST.personagens.length;i++){
    var p = ST.personagens[i];
    var isPago = i >= 4;
    var badge = isPago
      ? '<span class="badge-pago">+ R$ '+fmtMoney(PRECO_EXTRA)+'</span>'
      : '<span class="badge-free">\u2713 Gratis</span>';
    var fotoHtml = p.fotoUrl
      ? '<img class="pers-foto" src="'+p.fotoUrl+'"/>'
      : '<div class="pers-placeholder" onclick="tFoto('+p.id+')">\u{1F4F8}</div>';
    var removeBtn = i > 0 ? '<button class="pers-remove" onclick="remP('+p.id+'">\u2715</button>' : '';
    var labelNome = i===0 ? 'Nome da crianca (protagonista)' : 'Nome do personagem';
    var placeholderNome = i===0 ? 'Ex: Sofia, Miguel...' : 'Ex: Vovo Maria...';
    var opcoesSelect = '';
    for(var j=0;j<PAPEIS.length;j++){
      var sel = p.papel===PAPEIS[j].v?' selected':'';
      opcoesSelect += '<option value="'+PAPEIS[j].v+'"'+sel+'>'+PAPEIS[j].l+'</option>';
    }
    html += '<div class="pers-card'+(isPago?' premium':'')+'">'
      +badge
      +'<div class="pers-foto-wrap">'+fotoHtml
      +'<div class="pers-edit-btn" onclick="tFoto('+p.id+')">\u270F\uFE0F</div>'
      +'<input type="file" id="fi-'+p.id+'" accept="image/*" onchange="onFoto('+p.id+',this)"/>'
      +'</div>'
      +'<div class="pers-info"><label>'+labelNome+'</label>'
      +'<input type="text" placeholder="'+placeholderNome+'" value="'+p.nome+'" oninput="ST.personagens['+i+'].nome=this.value"/>'
      +'<div class="pers-role"><select onchange="ST.personagens['+i+'].papel=this.value">'+opcoesSelect+'</select></div>'
      +'</div>'+removeBtn+'</div>';
  }
  l.innerHTML = html;
  var btn = document.getElementById('btnAdd');
  if(btn) btn.style.display = ST.personagens.length >= 8 ? 'none' : 'flex';
}

function tFoto(id){ var el=document.getElementById('fi-'+id); if(el)el.click(); }
function onFoto(id,inp){
  var f=inp.files[0]; if(!f)return;
  var p=ST.personagens.filter(function(x){return x.id===id;})[0];
  if(p){ p.fotoUrl=URL.createObjectURL(f); p.avatarUrl=null; p.avatarErro=false; }
  renderPers();
}
function tentarAdd(){
  if(ST.personagens.length>=4){
    var mo=document.createElement('div');
    mo.className='modal-overlay';
    mo.innerHTML='<div class="modal"><span class="modal-emoji">\u2B50</span>'
      +'<h3>Personagem extra</h3>'
      +'<p>Voce ja tem 4 personagens gratis! Para adicionar mais, ha um custo extra.</p>'
      +'<div class="modal-preco">R$ '+fmtMoney(PRECO_EXTRA)+'<small> / personagem extra</small></div>'
      +'<p style="font-size:.82rem;color:var(--texto-sec);margin-bottom:20px">Cobrado na finalizacao do pedido.</p>'
      +'<div class="modal-btns">'
      +'<button class="modal-btn-sim" onclick="confirmExtra(this.closest(\'.modal-overlay\'))">Sim, adicionar</button>'
      +'<button class="modal-btn-nao" onclick="this.closest(\'.modal-overlay\').remove()">Agora nao</button>'
      +'</div></div>';
    document.body.appendChild(mo);
  } else { addP(); }
}
function confirmExtra(ov){ ov.remove(); ST.extras++; addP(); }
function addP(){ ST.personagens.push({id:nextId++,nome:'',papel:'familiar',fotoUrl:null,avatarUrl:null,avatarErro:false}); renderPers(); }
function remP(id){
  var idx=ST.personagens.findIndex(function(p){return p.id===id;});
  if(idx>=4) ST.extras=Math.max(0,ST.extras-1);
  ST.personagens=ST.personagens.filter(function(p){return p.id!==id;});
  renderPers();
}
function av1(){
  if(!ST.personagens[0].nome.trim()||!ST.idadeCrianca.trim()){
    document.getElementById('erroP').classList.add('show'); return;
  }
  ST.step=2; render();
}

// S2: TIPO + ESTILO
function s2(c){
  var rotWD = ST.tipoHistoria==='roteiro'?'block':'none';
  var persWD = ST.tipoHistoria==='personalizada'?'block':'none';
  var estiloD = ST.tipoHistoria?'block':'none';
  var rotCards='';
  for(var i=0;i<ROTEIROS.length;i++){
    var r=ROTEIROS[i];
    var sel=ST.roteiro===r.id?' selected':'';
    rotCards+='<div class="rot-card'+sel+'" onclick="selRot(\''+r.id+'\')"><span class="rot-emoji">'+r.ec+'</span><h4>'+r.t+'</h4><p>'+r.d+'</p></div>';
  }
  var autoBadge=ST.estiloAuto?'<span class="estilo-auto-badge">\u2728 Sugerido para '+ST.idadeCrianca+' anos</span>':'';
  var vsel=ST.estiloFinal==='visual'?' selected':'';
  var nsel=ST.estiloFinal==='narrativo'?' selected':'';
  var op1=ST.tipoHistoria==='roteiro'?' selected':'';
  var op2=ST.tipoHistoria==='personalizada'?' selected':'';

  c.innerHTML='<div class="slabel">Passo 2 de 6</div>'
    +'<h2 class="stit">Que tipo de historia?</h2>'
    +'<p class="sdesc">Escolha o tema e o estilo do livro para <strong>'+ST.personagens[0].nome+'</strong>.</p>'
    +'<div class="opcoes">'
    +'<div class="opcao'+op1+'" onclick="selTipo(\'roteiro\')"><div class="opcao-icon">\u{1F4DA}</div><div class="opcao-info"><h4>Tema pronto</h4><p>Escolha entre 7 temas incriveis!</p></div></div>'
    +'<div class="opcao'+op2+'" onclick="selTipo(\'personalizada\')"><div class="opcao-icon">\u270F\uFE0F</div><div class="opcao-info"><h4>Contar uma historia real</h4><p>A IA transforma em livro magico!</p></div></div>'
    +'</div>'
    +'<div id="rotWrap" style="display:'+rotWD+'"><div class="roteiros">'+rotCards+'</div></div>'
    +'<div id="persWrap" style="display:'+persWD+';margin-top:18px">'
    +'<label class="campo-label">Conte o que aconteceu \u{1F4AC}</label>'
    +'<textarea placeholder="Ex: A vovo Maria sempre leva a Sofia ao parque. Um dia encontraram um passarinho machucado e cuidaram juntos ate ele voar de volta. A Sofia ficou tao feliz que chorou. Descreva com detalhes: onde foi, o que aconteceu, como cada um reagiu, o que fez aquele momento especial..." maxlength="2000" oninput="ST.historiaConta=this.value;document.getElementById(\'cnt\').textContent=this.value.length+\'/2000\'">'+ST.historiaConta+'</textarea>'
    +'<div class="contador" id="cnt">'+ST.historiaConta.length+'/2000</div>'
    +'</div>'
    +'<div class="estilo-wrap" id="estiloWrap" style="display:'+estiloD+'">'
    +'<div class="estilo-titulo">Estilo do livro '+autoBadge+'</div>'
    +'<div class="estilo-cards">'
    +'<div class="estilo-card visual'+vsel+'" onclick="selEstilo(\'visual\')"><span class="estilo-emoji">\u{1F3A8}</span><h4>Mais ilustracoes</h4><p>Frases curtinhas, imagens grandes. Ideal ate 7 anos.</p><span class="badge-visual">\u{1F4D6} Visual</span></div>'
    +'<div class="estilo-card narrativo'+nsel+'" onclick="selEstilo(\'narrativo\')"><span class="estilo-emoji">\u{1F4DD}</span><h4>Mais texto</h4><p>Enredo completo, 3 capitulos. Ideal para 8+ anos.</p><span class="badge-narrativo">\u{1F4DA} Narrativo</span></div>'
    +'</div></div>'
    +'<div class="erro-msg" id="erroT">Complete sua escolha para continuar.</div>'
    +'<div class="btn-row"><button class="btn btn-secondary" onclick="voltar()">\u2190 Voltar</button><button class="btn btn-primary" onclick="av2()">Continuar \u2192</button></div>';
}

function selTipo(t){
  ST.tipoHistoria=t;
  document.getElementById('rotWrap').style.display=t==='roteiro'?'block':'none';

function buildPrompt(est, proto, outros, tema, listaP, instrP){
  var roteiro = ST.roteiro || 'aventura';
  var idade = ST.idadeCrianca || '6';
  var quem = ST.respostas.quem_da || 'da familia';
  var detalhe = ST.respostas.detalhe || 'nenhum';
  var p = '';

  // Tom especifico por roteiro
  var tomRoteiro = {
    aventura: 'Aventura epica. Ritmo acelerado, perigo real, coragem testada, vitoria conquistada.',
    amizade: 'Historia de amizade verdadeira. Conflito entre amigos, incompreensao, reconciliacao emotiva.',
    familia: 'Amor familiar profundo. Momento especial entre pessoas que se amam, detalhe que toca o coracao.',
    magia: 'Mundo magico com regras proprias. Encantamento, criaturas fantasticas, poderes descobertos.',
    animal: 'Vinculo entre crianca e animal. Comunicacao silenciosa, lealdade, aventura compartilhada.',
    sonho: 'Realizacao de um sonho grande. Duvida interna, superacao de obstaculos, conquista emocionante.',
    terror: 'Terror infantil divertido. Sustos genuinos, atmosfera dark, final que mistura alivio e risada. Pode ter vilao assustador.'
  }[roteiro] || 'Historia emocionante com coragem e amor.';

  if(est==='visual'){
    p = 'Voce e o melhor autor brasileiro de livros infantis ilustrados. Cada pagina que voce escreve e uma cena cinematografica que faz criancas pedirem "le de novo!"\n\n';
    p += 'DADOS DA HISTORIA:\n';
    p += 'Protagonista: ' + proto.nome + ', ' + idade + ' anos\n';
    p += 'Personagens (TODOS devem aparecer ativamente):\n' + listaP;
    p += 'Presente de: ' + quem + '\n';
    p += 'Detalhes pessoais: ' + detalhe + '\n';
    p += 'Tema: ' + tema + '\n';
    p += 'Tom: ' + tomRoteiro + '\n\n';
    p += instrP + '\n\n';
    p += 'COMO ESCREVER CADA PAGINA:\n';
    p += 'Frase 1: Acao ou cena descrita com 1 detalhe sensorial marcante (cor, som, cheiro, textura)\n';
    p += 'Frase 2: Reacao emocional do protagonista OU fala direta de um personagem entre aspas\n';
    p += 'Use o nome dos personagens em quase todas as paginas.\n';
    p += 'Onomatopeias sao bem-vindas (SPLASH! CRASH! ZAP!) quando fazem sentido.\n\n';
    p += 'ARCO DAS 6 PAGINAS:\n';
    p += 'Pag 1: Cena inicial que apresenta o protagonista em seu mundo\n';
    p += 'Pag 2: Algo muda, surpresa ou chamado para aventura\n';
    p += 'Pag 3: Desafio ou obstaculo real aparece\n';
    p += 'Pag 4: Momento de duvida ou perigo maximo\n';
    p += 'Pag 5: Virada, o protagonista age com coragem ou criatividade\n';
    p += 'Pag 6: Resolucao emocionante, todos juntos, frase final que fica na memoria\n\n';
    p += 'Responda APENAS com este JSON (sem markdown, sem explicacoes):\n';
    p += '{"titulo":"Titulo curto e memoravel que a crianca vai querer repetir","emoji":"emoji que representa a historia","paginas":[{"num":1,"titulo":"Titulo evocativo da pagina","texto":"Frase 1 com detalhe sensorial.\\n\\nFrase 2 com emocao ou fala."},{"num":2,"titulo":"Titulo","texto":"Frase 1.\\n\\nFrase 2."},{"num":3,"titulo":"Titulo","texto":"Frase 1.\\n\\nFrase 2."},{"num":4,"titulo":"Titulo","texto":"Frase 1.\\n\\nFrase 2."},{"num":5,"titulo":"Titulo","texto":"Frase 1.\\n\\nFrase 2."},{"num":6,"titulo":"Titulo","texto":"Frase 1.\\n\\nFrase 2."}]}';
  } else {
    p = 'Voce e um dos maiores autores brasileiros de literatura infantil. Voce conhece o segredo das historias que ficam para sempre: personagens reais, emocoes verdadeiras, e um fio narrativo que prende do inicio ao fim.\n\n';
    p += 'Esta historia sera impressa e dada de presente. Ela precisa ser boa o suficiente para a pessoa guardar pelo resto da vida.\n\n';
    p += 'DADOS DA HISTORIA:\n';
    p += 'Protagonista: ' + proto.nome + ', ' + idade + ' anos\n';
    p += 'Todos os personagens (TODOS devem ter cenas e falas relevantes):\n' + listaP;
    p += 'Presente de: ' + quem + '\n';
    p += 'Detalhes pessoais para incluir: ' + detalhe + '\n';
    p += 'Tema: ' + tema + '\n';
    p += 'Tom e genero: ' + tomRoteiro + '\n\n';
    p += instrP + '\n\n';
    p += 'COMO CONSTRUIR A HISTORIA:\n\n';
    p += 'INICIO - Os primeiros 6 paragrafos precisam:\n';
    p += '1. Abrir com uma cena viva e especifica - nao "era uma vez", mas algo que acontece AGORA com detalhe sensorial\n';
    p += '2. Mostrar quem e ' + proto.nome + ' atraves de uma acao ou pensamento tipico dele/dela, nao de descricao\n';
    p += '3. Trazer os outros personagens de forma organica, com uma fala ou gesto que mostra quem sao\n';
    p += '4. Estabelecer o mundo da historia com detalhes que fazem o leitor VER o lugar\n';
    p += '5. Introduzir o problema, desafio ou situacao central de forma que crie urgencia\n';
    p += '6. Terminar o inicio com ' + proto.nome + ' tomando uma decisao que vai mudar tudo\n\n';
    p += 'MEIO - Os proximos 6 paragrafos precisam:\n';
    p += '1. Mostrar ' + proto.nome + ' tentando resolver o problema - e falhando de forma interessante\n';
    p += '2. Dar a CADA personagem secundario um momento proprio: uma fala, uma acao, uma reacao que importa\n';
    p += '3. Elevar a tensao - as coisas ficam mais dificeis, o risco aumenta\n';
    p += '4. Criar um momento de duvida real: ' + proto.nome + ' considera desistir ou muda sua visao\n';
    p += '5. Ponto de virada emocional: algo que ' + proto.nome + ' descobre sobre si mesmo ou sobre os outros\n';
    p += '6. O climax se aproxima - escreva com frases mais curtas, ritmo mais acelerado\n\n';
    p += 'FIM - Os ultimos 5 paragrafos precisam:\n';
    p += '1. A acao final de ' + proto.nome + ' - corajosa, criativa, unica para esse personagem\n';
    p += '2. Mostrar como cada personagem e afetado pela resolucao - cada um tem sua reacao\n';
    p += '3. O momento de celebracao ou emocao compartilhada entre todos\n';
    p += '4. Uma cena final que mostra (sem explicar) o que ' + proto.nome + ' aprendeu - pode ser um gesto, um olhar, uma fala\n';
    p += '5. Fechamento poetico que menciona ' + quem + ' e deixa o leitor com calor no coracao\n\n';
    p += 'REGRAS DE OURO:\n';
    p += '- Cada paragrafo tem pelo menos uma fala entre aspas - personagens reais falam\n';
    p += '- Pelo menos 3 momentos com detalhes sensoriais especificos (cheiro, textura, som, cor)\n';
    p += '- Varie o ritmo: paragrafos longos para momentos contemplativas, frases curtas para tensao\n';
    p += '- Use o nome ' + proto.nome + ' pelo menos 15 vezes na historia inteira\n';
    p += '- Nunca explique a moral. Mostre atraves das acoes.\n';
    p += '- Separe todos os paragrafos com linha em branco\n\n';
    p += 'Responda APENAS com este JSON (sem markdown, sem texto fora do JSON):\n';
    p += '{"titulo":"Titulo que a crianca vai querer repetir - memoravel e especifico para esta historia","emoji":"emoji perfeito para o tom","inicio":"6 paragrafos ricos separados por linha em branco","meio":"6 paragrafos ricos separados por linha em branco","fim":"5 paragrafos ricos separados por linha em branco"}';
  }
  return p;
}

async function gerarHistoria(){
  var msgs=['Acordando a imaginacao...','Desenvolvendo os personagens...','Escrevendo a historia...','Criando os momentos especiais...','Polindo os detalhes...','Quase pronto!'];
  var idx=0;
  var iv=setInterval(function(){var el=document.getElementById('loadTxt');if(el)el.textContent=msgs[++idx%msgs.length];},1800);

  var proto=ST.personagens[0];
  var est=ST.estiloFinal||'narrativo';
  var rot=ROTEIROS.filter(function(r){return r.id===ST.roteiro;})[0];
  var tema=ST.tipoHistoria==='roteiro'?('Tema: '+rot.t+' - '+rot.d):('Historia real da familia: '+ST.historiaConta);

  var listaP='';
  for(var pi=0;pi<ST.personagens.length;pi++){
    var pp=ST.personagens[pi];
    var ppl=PAPEIS.filter(function(r){return r.v===pp.papel;})[0].l;
    listaP += '- '+pp.nome+' ('+ppl+')\n';
  }
  var instrP = ST.personagens.length > 1
    ? 'MUITO IMPORTANTE: TODOS os personagens listados DEVEM aparecer e participar ativamente. Cada um deve ter pelo menos uma cena ou fala relevante. Nao omita nenhum.'
    : '';

  var prompt = buildPrompt(est, proto, '', tema, listaP, instrP);

  try{
    var res=await fetch('https://squishbook-backend.onrender.com/api/historia',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
    });
    var data=await res.json();
    clearInterval(iv);
    if(data.content&&data.content[0]&&data.content[0].text){
      var raw=data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
      ST.historia=JSON.parse(raw);
      ST.step=5; render();
    } else throw new Error('sem resposta');
  }catch(e){
    clearInterval(iv);
    var n=proto.nome;
    var outro=ST.personagens.length>1?ST.personagens[1].nome:(ST.respostas.quem_da||'alguem especial');
    if(est==='visual'){
      ST.historia={titulo:n+' e a Grande Descoberta',emoji:'\u{1F31F}',paginas:[
        {num:1,titulo:'Era uma vez...',texto:n+' acordou com o sol brilhando.\n\nHoje seria um dia muito especial!'},
        {num:2,titulo:'A aventura comeca',texto:'O jardim estava cheio de surpresas.\n\n'+n+' correu animado para explorar!'},
        {num:3,titulo:'Uma surpresa!',texto:'Atras da arvore grande, havia algo brilhando.\n\n'+n+' prendeu a respiracao de emocao.'},
        {num:4,titulo:'Que maravilha!',texto:'Era uma borboleta colorida gigante!\n\nEla pousou no braco de '+n+' com delicadeza.'},
        {num:5,titulo:'Juntos!',texto:outro+' chegou correndo para ver tambem.\n\nJuntos riram e aplaudiram de felicidade!'},
        {num:6,titulo:'Para sempre',texto:n+' guardou aquele momento no coracao.\n\nAlguns dias ficam na memoria para sempre.'}
      ]};
    } else {
      var ini = n+' tinha '+ST.idadeCrianca+' anos e naquele dia tudo era diferente.\n\n';
      ini += 'O sol parecia mais brilhante, o ar mais fresco, e aquela sensacao estranha na barriga so aparecia quando algo incrivel estava prestes a acontecer.\n\n';
      ini += outro+' chegou com um sorriso que dizia tudo sem precisar de palavras. "Hoje vai ser diferente", disse baixinho.\n\n';
      ini += 'O bairro que '+n+' conhecia de cor ganhou contornos novos naquele momento. Cada detalhe parecia mais vivo, mais real, mais cheio de significado.\n\n';
      ini += 'Entao aconteceu. Um acontecimento pequeno para os outros, imenso para '+n+'. Um chamado que nao podia ser ignorado.\n\n';
      ini += 'Com o coracao acelerado e os olhos brilhando, '+n+' respirou fundo e deu o primeiro passo. Nao sabia o que viria. Mas sabia que precisava ir.';
      var mei = 'O caminho foi longo e cheio de surpresas. Cada curva trazia algo novo para '+n+' descobrir.\n\n';
      mei += outro+' estava ali em cada momento dificil, com aquela presenca que faz tudo parecer possivel.\n\n';
      mei += 'Mas entao veio o obstaculo. Grande, assustador, diferente de tudo que '+n+' havia enfrentado antes. Por um segundo, a duvida bateu forte.\n\n';
      mei += 'Foi uma lembranca que salvou tudo. Uma coisa que alguem especial tinha ensinado, guardada la no fundo do coracao para uma hora como aquela.\n\n';
      mei += 'A tensao era maxima. O tempo parecia ter parado. '+n+' olhou para '+outro+' e encontrou nos olhos dele tudo que precisava saber.\n\n';
      mei += 'E foi assim que '+n+' descobriu de onde vem a coragem de verdade: ela nao esta no ausencia do medo, mas na decisao de agir mesmo sentindo ele.';
      var fim = 'O que aconteceu a seguir ficou gravado na memoria de '+n+' para sempre.\n\n';
      fim += 'Cada personagem foi afetado de um jeito diferente. Mas todos saiam maiores do que tinham entrado.\n\n';
      fim += 'Houve um momento, um instante suspenso no tempo, em que tudo fez sentido. Risos, lagrimas, abracos. A vida inteira cabendo em um unico segundo.\n\n';
      fim += n+' entendeu entao que as historias mais bonitas nao sao aquelas que acontecem nos livros. Sao as que a gente vive, com as pessoas certas, nas horas certas.\n\n';
      fim += 'E toda vez que '+n+' olhasse para aquele presente especial, lembraria: de '+outro+', daquele dia, e da descoberta mais importante de todas: que o amor e a maior aventura que existe.';
      ST.historia={titulo:'A Incrivel Aventura de '+n,emoji:'\u{1F31F}',inicio:ini,meio:mei,fim:fim};
    }
    ST.step=5; render();
  }
}

}

async function gerarAvatarDalle(p){
  // Converte e REDIMENSIONA foto para base64 (max 512px para nao estourar o limite da function)
  var imageUrl = null;
  if(p.fotoUrl && p.fotoUrl.startsWith('blob:')){
    try{
      var blob = await fetch(p.fotoUrl).then(function(r){return r.blob();});
      imageUrl = await new Promise(function(res){
        var img = new Image();
        img.onload = function(){
          var MAX = 512;
          var w = img.width, h = img.height;
          if(w > MAX || h > MAX){
            if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = function(){ res(null); };
        img.src = URL.createObjectURL(blob);
      });
    }catch(e){ imageUrl = null; }
  }

  // Expressao baseada no papel E no roteiro da historia
  var roteiro = ST.roteiro || 'aventura';
  var expressao;
  if(p.papel === 'protagonista'){
    if(roteiro === 'terror') expressao = 'brave but slightly scared expression, wide determined eyes, nervous half-smile';
    else if(roteiro === 'aventura') expressao = 'heroic and excited expression, confident bright eyes, big adventurous smile';
    else if(roteiro === 'magia') expressao = 'magical wonder-filled expression, sparkling starry eyes, amazed open smile';
    else if(roteiro === 'sonho') expressao = 'dreamy and hopeful expression, soft glowing eyes, gentle confident smile';
    else expressao = 'warm and joyful expression, bright eyes, big happy smile';
  } else if(p.papel === 'familiar'){
    expressao = 'warm and loving expression, kind gentle eyes, caring protective smile';
  } else if(p.papel === 'amigo'){
    if(roteiro === 'terror') expressao = 'mischievous and playful expression, wide excited eyes, cheeky grin';
    else expressao = 'friendly and cheerful expression, happy eyes, big energetic smile';
  } else if(p.papel === 'pet'){
    expressao = 'adorable animal, happy excited eyes, tongue out, full of energy';
  } else {
    if(roteiro === 'terror') expressao = 'spooky mysterious villain expression, dramatic wide eyes, eerie grin, menacing but still cute chibi style';
    else expressao = 'unique expressive character, friendly curious eyes, charming smile';
  }

  // Paleta de cores Squishbook por papel
  var cor = {
    protagonista: 'sky blue, golden yellow and white',
    familiar: 'soft rose pink, warm cream and lilac',
    amigo: 'purple, lavender and mint',
    pet: 'warm brown, cream and forest green',
    outro: roteiro === 'terror' ? 'dark purple, midnight blue and ghostly white' : 'orange, peach and yellow'
  }[p.papel] || 'pastel multicolor';

  // Tipo de personagem: humano ou animal
  var ehPet = p.papel === 'pet';

  var descFisica = '';
  if(p.papel === 'protagonista' && ST.idadeCrianca && ST.idadeCrianca <= 8){
    descFisica = 'young child approximately '+ST.idadeCrianca+' years old, small and cute, ';
  }

  var prompt;
  if(ehPet){
    prompt = 'Squishbook style kawaii chibi animal character. '
      + 'A super cute adorable fluffy pet animal. '
      + expressao + '. '
      + 'Squishbook signature art style: ultra soft squishy plush doll, '
      + 'oversized glossy eyes with sparkle, chubby body, tiny nose, '
      + cor + ' color palette, pastel colors, fluffy plush texture, '
      + 'white clean background, centered full body, high quality childrens book illustration. '
      + 'NO text, NO watermark.';
  } else {
    prompt = 'Squishbook style chibi character. '
      + 'ABSOLUTE RULE: HUMAN CHARACTER ONLY - never an animal, never has fur, never has animal features. '
      + 'This is a real human person turned into an adorable chibi illustration. '
      + descFisica
      + 'CRITICAL: carefully observe the reference photo and copy: '
      + 'exact hair color and texture (dark, light, curly, straight, long, short), '
      + 'skin tone (fair, medium, dark), eye color, face shape, '
      + 'facial hair if present, any other distinctive features. '
      + 'The character MUST be immediately recognizable as the same person from the photo. '
      + expressao + '. '
      + 'Squishbook art style: ultra soft squishy human plush doll character, '
      + 'oversized glossy eyes with sparkle highlights, chubby round human face, rosy cheeks, tiny button nose, '
      + 'big head small body chibi proportions, '
      + cor + ' clothing and accent colors, '
      + 'soft pastel shading with gentle gradients, clean white background, '
      + 'high quality digital illustration, professional childrens book style. '
      + 'HUMAN ONLY - strictly no animal features, no fur, no snout, no claws, no tail. '
      + 'NO text, NO watermark.';
  }

  try{
    var model = (!ehPet && imageUrl) ? 'fal-ai/flux-pulid' : 'fal-ai/flux/schnell';
    var body = (!ehPet && imageUrl)
      ? {prompt:prompt, reference_image_url:imageUrl, num_images:1, image_size:'square_hd', guidance_scale:8}
      : {prompt:prompt, num_images:1, image_size:'square_hd'};
    var ctrl=new AbortController();
    var tmout=setTimeout(function(){ctrl.abort();},45000);
    var res = await fetch('https://squishbook-backend.onrender.com/api/avatar', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:model,payload:body}),
      signal:ctrl.signal
    });
    clearTimeout(tmout);
    var data = await res.json();
    var url = data.images && data.images[0] && data.images[0].url;
    if(url){ 
      p.avatarUrl=url;
      // Salva prompt base e caracteristicas para reusar nas cenas
      // As cenas vao usar esse mesmo prompt + avatarUrl como referencia de estilo
      p.promptBase = ehPet
        ? ('Squishbook style kawaii chibi animal character, '+descFisica+cor+' color palette. ')
        : ('Squishbook style chibi character. '+descFisica
          +'Squishbook art style: ultra soft squishy human plush doll character, '

          +'big head small body chibi proportions, '+cor+' clothing and accent colors. ');

      if(p.avatarUrl){
        conteudo='<img src="'+p.avatarUrl+'" style="width:100px;height:100px;border-radius:16px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,.12)"/>';
      } else {
        conteudo=p.fotoUrl
          ?'<img src="'+p.fotoUrl+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2.5px solid var(--azul-cl)"/>'
          :'<div style="width:100px;height:100px;border-radius:16px;background:var(--azul-pal);display:flex;align-items:center;justify-content:center;font-size:2.5rem">\u2728</div>';
      }
      items[i].innerHTML=conteudo+'<div class="avatar-nome">'+p.nome+'</div><div class="avatar-papel">'+papelLabel+'</div>';

async function ativarEtapa(id){
  var el=document.getElementById(id); if(!el)return;
  // Marca anterior como feita
  var all=['e1','e2','e3','e4','e5'];
  var idx=all.indexOf(id);
  if(idx>0){
    var prev=document.getElementById(all[idx-1]);
    if(prev){prev.className='et feita';prev.querySelector('.et-ico').textContent='\u2713';}
  }
  el.className='et ativa';
  await new Promise(function(r){setTimeout(r,300);});
}

async function gerarCenas(){
  // FAL_KEY agora fica segura no servidor (netlify function)
  POS.cenasGeradas=[];

  await ativarEtapa('e1');

  // Determina paginas da historia
  var paginas=[];
  if(ST.estiloFinal==='visual'&&ST.historia.paginas){
    paginas=ST.historia.paginas;
  } else {
    // Divide narrativo em 3 cenas principais
    paginas=[
      {num:1,titulo:'O inicio da aventura',texto:ST.historia.inicio?ST.historia.inicio.split('\n\n')[0]:''},
      {num:2,titulo:'O momento de tensao',texto:ST.historia.meio?ST.historia.meio.split('\n\n')[2]:''},
      {num:3,titulo:'O final emocionante',texto:ST.historia.fim?ST.historia.fim.split('\n\n')[0]:''}
    ];
  }

  await ativarEtapa('e2');

  // Gera cena para cada pagina em paralelo (com limite de 3 simultâneas)
  var BATCH=3;
  for(var b=0;b<paginas.length;b+=BATCH){
    var lote=paginas.slice(b,b+BATCH);
    var promises=lote.map(function(pg,li){return gerarCenaPagina(pg,b+li);});
    var resultados=await Promise.all(promises);
    for(var r=0;r<resultados.length;r++){
      POS.cenasGeradas.push(resultados[r]);
    }
  }

  await ativarEtapa('e3');
  await new Promise(function(r){setTimeout(r,500);});
  await ativarEtapa('e4');
  await new Promise(function(r){setTimeout(r,500);});
  await ativarEtapa('e5');

  // Marca ultima como feita
  var ult=document.getElementById('e5');
  if(ult){ult.className='et feita';ult.querySelector('.et-ico').textContent='\u2713';}
  await new Promise(function(r){setTimeout(r,400);});
}

async function gerarCenaPagina(pg,idx){

  for(var i=0;i<ST.personagens.length;i++){
    var p=ST.personagens[i];
    if(p.nome&&pg.texto&&pg.texto.toLowerCase().indexOf(p.nome.toLowerCase())>=0){
      parsNaPg.push(p);
    }
  }
  if(parsNaPg.length===0) parsNaPg=[ST.personagens[0]];

  var textoLower=(pg.texto||'').toLowerCase();
  var tituloLower=(pg.titulo||'').toLowerCase();
  var combinado=textoLower+' '+tituloLower;

  var expressao='joyful and curious, smiling warmly';
  if(combinado.indexOf('assust')>-1||combinado.indexOf('medo')>-1||combinado.indexOf('terror')>-1) expressao='scared but brave, wide eyes, slightly trembling';
  else if(combinado.indexOf('triste')>-1||combinado.indexOf('chor')>-1||combinado.indexOf('lagrima')>-1) expressao='sad and emotional, teary eyes, pouting lip';
  else if(combinado.indexOf('alegr')>-1||combinado.indexOf('feliz')>-1||combinado.indexOf('sorri')>-1||combinado.indexOf('riu')>-1) expressao='very happy, big beaming smile, eyes sparkling with joy';
  else if(combinado.indexOf('corag')>-1||combinado.indexOf('heroi')>-1||combinado.indexOf('brav')>-1) expressao='brave and determined, confident heroic stance';
  else if(combinado.indexOf('abraco')>-1||combinado.indexOf('amor')>-1||combinado.indexOf('juntos')>-1) expressao='warm and loving, arms open for a hug';
  else if(combinado.indexOf('surpres')>-1||combinado.indexOf('espant')>-1) expressao='amazed and surprised, mouth open wide, hands on cheeks';
  else if(combinado.indexOf('dormi')>-1||combinado.indexOf('sonho')>-1||combinado.indexOf('noite')>-1) expressao='sleepy and dreamy, soft half-closed eyes';
  else if(combinado.indexOf('raiva')>-1||combinado.indexOf('zangad')>-1) expressao='upset and stubborn, arms crossed';
  else if(combinado.indexOf('corr')>-1||combinado.indexOf('pul')>-1||combinado.indexOf('brinc')>-1) expressao='excited and playful, jumping with arms wide open';

  var cenario='warm cozy living room with soft sofa, family photos on wall, fireplace and colorful rugs';
  if(combinado.indexOf('quarto')>-1||combinado.indexOf('cama')>-1) cenario='cozy magical bedroom with glowing fairy lights on ceiling, colorful soft pillows, moonlight through curtains, stuffed animals on shelves';
  else if(combinado.indexOf('floresta')>-1||combinado.indexOf('mata')>-1||combinado.indexOf('arvore')>-1) cenario='enchanted forest with giant glowing trees, magical fireflies, golden light filtering through leaves, mushrooms and flowers on the ground';
  else if(combinado.indexOf('castelo')>-1||combinado.indexOf('palacio')>-1) cenario='fairy tale castle interior with tall colorful banners, glowing magic windows, shiny stone floors and grand staircase';
  else if(combinado.indexOf('praia')>-1||combinado.indexOf('mar')>-1||combinado.indexOf('ocean')>-1) cenario='sunny magical beach with crystal blue sea, colorful seashells on golden sand, gentle waves and bright sunny sky';
  else if(combinado.indexOf('escola')>-1||combinado.indexOf('aula')>-1) cenario='cheerful bright classroom with rainbow-colored desks, drawings on chalkboard and large windows with golden sunlight';
  else if(combinado.indexOf('parque')>-1||combinado.indexOf('jardim')>-1||combinado.indexOf('quintal')>-1) cenario='magical colorful garden with giant blooming flowers, butterflies, green rolling grass hills and bright blue sky with fluffy clouds';
  else if(combinado.indexOf('cozinha')>-1||combinado.indexOf('bolo')>-1) cenario='warm cozy kitchen with freshly baked cakes on table, golden oven glow and colorful pots hanging on wall';
  else if(combinado.indexOf('ceu')>-1||combinado.indexOf('nuvem')>-1||combinado.indexOf('voar')>-1) cenario='magical sky scene on giant fluffy clouds, rainbow in background, golden sunlight, colorful hot air balloons floating nearby';
  else if(combinado.indexOf('caverna')>-1||combinado.indexOf('escuro')>-1) cenario='mysterious glowing cave with giant colorful crystals on walls, dramatic shadows and magical blue light beams';
  else if(combinado.indexOf('cidade')>-1||combinado.indexOf('rua')>-1) cenario='charming colorful storybook street with small shops, flower pots on windowsills, cobblestones and warm golden afternoon light';
  else if(combinado.indexOf('espaco')>-1||combinado.indexOf('estrela')>-1||combinado.indexOf('planeta')>-1) cenario='magical outer space with colorful planets, sparkly star clusters, swirling nebula clouds and giant glowing moon';
  else if(combinado.indexOf('assombra')>-1||combinado.indexOf('fantasma')>-1) cenario='spooky haunted mansion at night with glowing jack-o-lanterns, bats flying, purple moonlight and twisted bare trees';
  else if(combinado.indexOf('montanha')>-1||combinado.indexOf('topo')>-1) cenario='dramatic mountain top with golden treasure chests, clouds below, epic sunset sky with golden and purple hues';

  // Monta descricao de TODOS os personagens na cena
  var descPersonagens='';
  var primeiroAvatarUrl=null;
  for(var i=0;i<parsNaPg.length;i++){
    var par=parsNaPg[i];
    var roleDesc=par.papel==='protagonista'?'main character child':par.papel==='familiar'?'adult family member':par.papel==='amigo'?'child friend':par.papel==='pet'?'cute pet animal':'character';
    if(par.promptBase){
      descPersonagens+=(i>0?'SECOND CHARACTER ':'CHARACTER ')+'('+roleDesc+'): '+par.promptBase+' ';
    } else {
      descPersonagens+=(i>0?'SECOND CHARACTER ':'CHARACTER ')+'('+roleDesc+'): adorable kawaii chibi with big sparkly eyes and rosy cheeks. ';
    }
    if(!primeiroAvatarUrl&&par.avatarUrl) primeiroAvatarUrl=par.avatarUrl;
  }

  // Acao entre personagens
  var acaoInteracao='';
  if(parsNaPg.length>1){
    if(combinado.indexOf('abraco')>-1||combinado.indexOf('juntos')>-1||combinado.indexOf('amor')>-1) acaoInteracao='They are hugging each other warmly. ';
    else if(combinado.indexOf('corag')>-1||combinado.indexOf('heroi')>-1) acaoInteracao='They are standing bravely side by side together. ';
    else if(combinado.indexOf('corr')>-1||combinado.indexOf('brinc')>-1||combinado.indexOf('pul')>-1) acaoInteracao='They are playing and running together joyfully. ';
    else if(combinado.indexOf('assust')>-1||combinado.indexOf('medo')>-1) acaoInteracao='They are holding hands, looking scared but brave together. ';
    else acaoInteracao='They are together in the scene, interacting naturally with each other. ';
  }

  // Atmosfera global por roteiro — define lighting, mood e paleta da cena inteira
  var roteiro=ST.roteiro||'aventura';
  var atmosfera;
  if(roteiro==='terror'){
    atmosfera='ATMOSPHERE: dark and spooky horror mood, deep dramatic shadows, eerie cold purple and blue moonlight, '
      +'creepy mist on the ground, dim flickering light, scary and suspenseful feeling. '
      +'Color palette: dark purples, deep blacks, cold blues, ghostly whites. ';
  } else if(roteiro==='aventura'){
    atmosfera='ATMOSPHERE: epic adventurous mood, dramatic golden hour lighting, bold warm sunlight casting long shadows, '
      +'heroic and exciting energy, dynamic composition. '
      +'Color palette: warm golds, rich blues, vibrant greens, dramatic sunset oranges. ';
  } else if(roteiro==='magia'){
    atmosfera='ATMOSPHERE: magical and enchanted mood, soft glowing sparkles everywhere, ethereal light beams, '
      +'dreamy pastel mist, stars and magical particles floating in the air, wonder and amazement. '
      +'Color palette: soft purples, glowing pinks, golden sparkles, dreamy blues. ';
  } else if(roteiro==='familia'){
    atmosfera='ATMOSPHERE: warm and cozy family mood, soft golden indoor lighting, heartwarming and tender feeling, '
      +'gentle warm glow like candlelight, safe and loving environment. '
      +'Color palette: warm yellows, soft oranges, cream whites, gentle browns. ';
  } else if(roteiro==='amizade'){
    atmosfera='ATMOSPHERE: joyful and cheerful friendship mood, bright colorful lighting, playful and fun energy, '
      +'rainbow colors and happiness everywhere, celebratory feeling. '
      +'Color palette: bright pinks, cheerful yellows, sky blues, fresh greens. ';
  } else if(roteiro==='animal'){
    atmosfera='ATMOSPHERE: warm nature mood, soft natural sunlight filtering through trees, '
      +'gentle and peaceful outdoor feeling, fresh and alive environment. '
      +'Color palette: natural greens, warm earth tones, soft sky blues, golden sunlight. ';
  } else if(roteiro==='sonho'){
    atmosfera='ATMOSPHERE: dreamy and hopeful mood, soft ethereal lighting, floating clouds and stars, '
      +'gentle pastel glow, everything slightly magical and surreal. '
      +'Color palette: soft lavenders, dreamy pinks, pale golds, misty whites. ';
  } else {
    atmosfera='ATMOSPHERE: warm and magical storybook mood, soft colorful lighting, joyful and inviting feeling. ';
  }

  // Interacao fisica explicita no INICIO do prompt (mais eficaz)
  var interacaoFisica='';
  if(parsNaPg.length>1){
    if(combinado.indexOf('abraco')>-1||combinado.indexOf('juntos')>-1||combinado.indexOf('amor')>-1)
      interacaoFisica='TWO CHIBI CHARACTERS HUGGING EACH OTHER tightly and warmly. ';
    else if(combinado.indexOf('medo')>-1||combinado.indexOf('assust')>-1||combinado.indexOf('terror')>-1)
      interacaoFisica='TWO CHIBI CHARACTERS HOLDING HANDS, both scared, trembling, looking around nervously together. ';
    else if(combinado.indexOf('corr')>-1||combinado.indexOf('brinc')>-1||combinado.indexOf('pul')>-1)
      interacaoFisica='TWO CHIBI CHARACTERS RUNNING AND PLAYING TOGETHER, laughing, full of energy. ';
    else if(combinado.indexOf('corag')>-1||combinado.indexOf('heroi')>-1)
      interacaoFisica='TWO CHIBI CHARACTERS STANDING SIDE BY SIDE BRAVELY, shoulder to shoulder, determined faces. ';
    else if(combinado.indexOf('grit')>-1||combinado.indexOf('chama')>-1||combinado.indexOf('fala')>-1)
      interacaoFisica='TWO CHIBI CHARACTERS TALKING TO EACH OTHER, one pointing or gesturing, both engaged. ';
    else
      interacaoFisica='TWO CHIBI CHARACTERS TOGETHER IN THE SCENE, interacting naturally with each other. ';
  }

  var prompt=(interacaoFisica?interacaoFisica:'')
    +'Squishbook childrens book full illustrated scene. '
    +atmosfera
    +'BACKGROUND SETTING (fills entire image, very detailed and immersive): '+cenario+'. '
    +'Rich layered environment: detailed foreground elements, mid-ground where characters stand, atmospheric background. '
    +'CHARACTERS: '+descPersonagens
    +(parsNaPg.length===1?'Character is INSIDE the scene, interacting with the environment naturally. ':'')
    +'Character emotion: '+expressao+'. '
    +'Art style: Squishbook signature - chibi plush characters with oversized sparkly eyes, chubby rosy cheeks, '
    +'professional storybook illustration quality, characters take 40% of frame, rich scene fills 60%. '
    +'NO text, NO watermark, NO speech bubbles, NO plain white background.';

  try{
    var model, body;
    if(primeiroAvatarUrl){
      // Usa flux-pulid com o avatar do protagonista como referencia de rosto
      model='fal-ai/flux-pulid';
      body={
        prompt: prompt,
        reference_image_url: primeiroAvatarUrl,
        num_images: 1,
        image_size: 'landscape_4_3',
        guidance_scale: 6,
        num_inference_steps: 20
      };
    } else {
      model='fal-ai/flux/schnell';
      body={prompt:prompt,num_images:1,image_size:'landscape_4_3',num_inference_steps:4};
    }
    var controller=new AbortController();
    var timeout=setTimeout(function(){controller.abort();},55000);
    var res=await fetch('https://squishbook-backend.onrender.com/api/avatar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:model,payload:body}),
      signal:controller.signal
    });
    clearTimeout(timeout);
    var data=await res.json();
    var url=data.images&&data.images[0]&&data.images[0].url;
    return {pg:pg,idx:idx,url:url||null,erro:!url};
  }catch(e){
    return {pg:pg,idx:idx,url:null,erro:true};
  }
}

function selEnvio(opcao,el){
  POS.opcaoEnvio=opcao;
  var ops=document.querySelectorAll('.envio-op');
  for(var i=0;i<ops.length;i++) ops[i].classList.remove('sel');
  el.classList.add('sel');
  var campo=document.getElementById('campoDestino');
  if(campo) campo.className='campo-dest'+(opcao!=='comprador'?' show':'');
}

async function aplicarAjuste(){
  var txt=document.getElementById('feedbackTxt');
  if(!txt||!txt.value.trim()) return;
  if(POS.rodadasAjuste>=POS.maxRodadas) return;

  var feedback=txt.value.trim();
  POS.rodadasAjuste++;

  var c=document.getElementById('cardContent');
  c.innerHTML='<div class="loading-wrap"><div class="loading-spinner"></div>'
    +'<div class="loading-txt">Aplicando ajuste...</div>'
    +'<div class="loading-sub">A IA esta interpretando sua solicitacao</div></div>';

  // Prompt de ajuste para a historia
  // Garante que a historia existe antes de ajustar
  if(!ST.historia||!ST.historia.titulo){mostrarPosPagamento(document.getElementById('cardContent'));return;}

  var promptAjuste='Voce escreveu uma historia infantil e o cliente pediu um ajuste. '
    +'Historia atual:\n\nTitulo: '+ST.historia.titulo
    +'\n\nInicio:\n'+(ST.historia.inicio||ST.historia.paginas?JSON.stringify(ST.historia.paginas):'')
    +'\n\nMeio:\n'+(ST.historia.meio||'')
    +'\n\nFim:\n'+(ST.historia.fim||'')
    +'\n\nSolicitacao do cliente: "'+feedback+'"'
    +'\n\nPersonagens: '+ST.personagens.map(function(p){return p.nome;}).join(', ')
    +'\n\nFaca o ajuste solicitado mantendo todos os personagens e o estilo da historia.'
    +'\n\nResponda APENAS com o JSON no mesmo formato da historia atual (sem markdown).';

  try{
    var res=await fetch('https://squishbook-backend.onrender.com/api/historia',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:4000,
        messages:[{role:'user',content:promptAjuste}]
      })
    });
    var data=await res.json();
    if(data.content&&data.content[0]&&data.content[0].text){
      var raw=data.content[0].text.trim().replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
      try{
        var novaHistoria=JSON.parse(raw);
        ST.historia=novaHistoria;
      }catch(e){}
    }
  }catch(e){}

  // Regera cenas com a historia ajustada
  await gerarCenas();
  mostrarPosPagamento(document.getElementById('cardContent'));
}

async function enviarLivro(){
  // Valida email
  if(POS.opcaoEnvio!=='comprador'&&!POS.emailDestino){
    document.getElementById('erroEnvio').classList.add('show'); return;
  }

  var emailDestino=POS.opcaoEnvio==='comprador'?ST.email:POS.emailDestino;

  var c=document.getElementById('cardContent');
  c.innerHTML='<div class="loading-wrap"><div class="loading-spinner"></div>'
    +'<div class="loading-txt">Gerando o PDF do livro...</div>'
    +'<div class="loading-sub">Preparando para enviar</div></div>';

  // Gera PDF
  try{
    await gerarPDF();
    mostrarConfirmacaoEnvio();
  }catch(e){
    mostrarConfirmacaoEnvio();
  }
}

function carregarImagem(url){
  return new Promise(function(resolve,reject){
    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      resolve(canvas.toDataURL('image/jpeg',0.85));
    };
    img.onerror=reject;
    img.src=url;
  });
}
