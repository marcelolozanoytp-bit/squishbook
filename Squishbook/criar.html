<style>
/* v4-cosmetico (26/04): paleta refeita para alinhar com a landing nova.
   Vari\u00e1veis antigas (--azul, --azul-esc, etc.) viram aliases das novas
   para n\u00e3o quebrar refer\u00eancias inline espalhadas no c\u00f3digo. */
:root{
  /* PALETA NOVA (sincronizada com index.html) */
  --roxo:#7C3AED;
  --roxo-cl:#EDE9FE;
  --roxo-esc:#5B21B6;
  --rosa-coral:#FF6B9D;
  --rosa-cl:#FFE4ED;
  --rosa-esc:#E8527A;
  --amarelo:#FFCD3C;
  --verde:#10B981;
  --creme:#FFFBF5;
  --branco:#FFFFFF;
  --texto:#180F2E;
  --texto-sec:#6B5E8A;
  --borda:#EDE8F8;
  --erro:#e24b4a;

  /* ALIASES (mant\u00eam c\u00f3digo legado funcionando) */
  --azul:var(--roxo);
  --azul-esc:var(--roxo-esc);
  --azul-deep:var(--roxo-esc);
  --azul-cl:var(--roxo-cl);
  --azul-pal:var(--roxo-cl);
  --rosa:var(--rosa-coral);
  --cinza:var(--creme);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;color:var(--texto);background:var(--creme);min-height:100vh}

/* BANNER DIA DAS M\u00c3ES (igual landing) */
.banner-topo{
  background:linear-gradient(135deg,#FF6B9D 0%,#E8527A 50%,#7C3AED 100%);
  color:white;padding:10px 24px;text-align:center;
  font-weight:700;font-size:.88rem;letter-spacing:.2px;
  position:relative;z-index:201;
}
.banner-topo strong{font-weight:900;color:#FFCD3C}
.banner-topo .countdown{
  display:inline-block;background:rgba(255,255,255,.18);
  padding:2px 10px;border-radius:20px;margin-left:8px;font-weight:800;
}
@media(max-width:640px){
  .banner-topo{font-size:.74rem;padding:8px 12px}
  .banner-topo .countdown{display:block;margin:4px auto 0;width:fit-content}
}

/* HEADER novo: creme com logo gradiente */
.header{
  background:rgba(255,251,245,.96);
  backdrop-filter:blur(20px);
  padding:14px 28px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(124,58,237,.08);
}
.header-logo{
  font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:900;
  text-decoration:none;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--roxo),var(--rosa-coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-logo span{color:rgba(124,58,237,.4);font-weight:300;-webkit-text-fill-color:rgba(124,58,237,.4)}

/* PROGRESS STEPS */
.progress-wrap{flex:1;display:flex;justify-content:center}
.progress-steps{display:flex;align-items:center;gap:4px}
.ps{display:flex;align-items:center;gap:4px}
.ps-dot{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.76rem;font-weight:800;
  border:2px solid var(--borda);color:var(--texto-sec);background:white;
  transition:all .3s;
}
.ps-dot.active{
  background:linear-gradient(135deg,var(--rosa-coral),var(--roxo));
  border-color:var(--roxo);color:white;
  box-shadow:0 4px 12px rgba(124,58,237,.32);
}
.ps-dot.done{background:var(--verde);border-color:var(--verde);color:white}
.ps-line{width:18px;height:2px;background:var(--borda);border-radius:2px;transition:background .3s}
.ps-line.done{background:var(--verde)}

.main{max-width:720px;margin:0 auto;padding:40px 20px 80px}
.card{
  background:white;border-radius:24px;
  padding:40px 44px;
  border:1px solid var(--borda);
  animation:slideIn .35s cubic-bezier(.34,1.2,.64,1) both;
  box-shadow:0 4px 30px rgba(124,58,237,.06);
}
@keyframes slideIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}

/* T\u00cdTULOS DAS ETAPAS */
.slabel{
  font-size:.72rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--rosa-coral);margin-bottom:10px;
}
.stit{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.85rem;letter-spacing:-.8px;line-height:1.15;
  color:var(--texto);margin-bottom:10px;
}
.sdesc{font-size:.98rem;color:var(--texto-sec);line-height:1.6;margin-bottom:24px}
.sdesc{font-size:.95rem;color:var(--texto-sec);line-height:1.65;margin-bottom:26px}

/* PERSONAGENS */
.pers-lista{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.pers-card{border:2px solid var(--borda);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s;position:relative}
.pers-card:hover{border-color:var(--azul-cl)}
.pers-card.premium{border-color:var(--rosa);background:rgba(237,147,177,.04)}
.pers-foto-wrap{position:relative;flex-shrink:0}
.pers-foto{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2.5px solid var(--azul-cl);display:block}
.pers-placeholder{width:68px;height:68px;border-radius:50%;background:var(--azul-pal);border:2.5px dashed var(--azul-cl);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:background .2s}
.pers-placeholder:hover{background:#d4e8fa}
.pers-edit-btn{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--azul-esc);border:2px solid #fff;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.pers-info{flex:1;min-width:0}
.pers-info label{font-size:.8rem;font-weight:700;color:var(--texto-sec);margin-bottom:5px;display:block}
.pers-info input{width:100%;border:1.5px solid var(--borda);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:.93rem;color:var(--texto);outline:none;transition:border-color .2s}
.pers-info input:focus{border-color:var(--azul)}
.pers-role select{width:100%;border:1.5px solid var(--borda);border-radius:10px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--texto-sec);outline:none;background:#fff;cursor:pointer;margin-top:7px}
.pers-meta{display:flex;gap:7px;margin-top:7px}
.pers-meta select{flex:1;border:1.5px solid var(--borda);border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:.85rem;color:var(--texto-sec);outline:none;background:#fff;cursor:pointer}
.pers-meta select:focus{border-color:var(--azul)}
.pers-remove{background:none;border:none;color:#ccc;font-size:1rem;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s;flex-shrink:0;align-self:flex-start}
.pers-remove:hover{color:var(--erro)}
.badge-free{position:absolute;top:10px;right:36px;background:var(--verde);color:white;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:20px}
.badge-pago{position:absolute;top:10px;right:36px;background:var(--rosa-esc);color:white;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:20px}
.btn-add{display:flex;align-items:center;gap:10px;padding:13px 18px;border:2px dashed var(--azul-cl);border-radius:14px;background:var(--azul-pal);color:var(--azul-esc);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;transition:background .2s,border-color .2s;margin-bottom:8px}
.btn-add:hover{background:#d4e8fa;border-color:var(--azul)}
input[type="file"]{display:none}

/* IDADE BOX */
.idade-box{background:linear-gradient(135deg,var(--azul-pal),rgba(175,169,236,.15));border:1.5px solid var(--azul-cl);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.idade-box label{font-size:.85rem;font-weight:800;color:var(--azul-deep);margin-bottom:10px;display:block}
.idade-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.idade-input{width:140px;border:1.5px solid var(--azul-cl);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--texto);outline:none;transition:border-color .2s;background:white}
.idade-input:focus{border-color:var(--azul)}
.estilo-hint{font-size:.85rem;font-weight:700;padding:6px 14px;border-radius:20px;display:none}
.estilo-hint.visual{background:rgba(212,83,126,.12);color:var(--rosa-esc);display:inline-block}
.estilo-hint.narrativo{background:rgba(127,119,221,.12);color:var(--roxo-esc);display:inline-block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:24px;padding:36px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-emoji{font-size:3rem;display:block;margin-bottom:16px}
.modal h3{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--azul-deep);margin-bottom:10px}
.modal p{font-size:.93rem;color:var(--texto-sec);line-height:1.65;margin-bottom:20px}
.modal-preco{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--rosa-esc);margin-bottom:6px}
.modal-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.modal-btn-sim{padding:13px 28px;border-radius:50px;background:linear-gradient(135deg,var(--rosa-esc),var(--roxo-esc));color:white;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:transform .2s}
.modal-btn-sim:hover{transform:scale(1.03)}
.modal-btn-nao{padding:13px 24px;border-radius:50px;background:white;color:var(--texto-sec);font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;border:2px solid var(--borda);cursor:pointer}

/* OPCOES */
.opcoes{display:flex;flex-direction:column;gap:12px}
.opcao{border:2px solid var(--borda);border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:14px}
.opcao:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.opcao.selected{border-color:var(--azul-esc);background:var(--azul-pal)}
.opcao-icon{font-size:1.6rem;width:44px;height:44px;background:var(--cinza);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opcao.selected .opcao-icon{background:var(--azul-cl)}
.opcao-info h4{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:var(--azul-deep);margin-bottom:3px}
.opcao-info p{font-size:.85rem;color:var(--texto-sec)}
.roteiros{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.rot-card{border:2px solid var(--borda);border-radius:14px;padding:14px 12px;cursor:pointer;transition:border-color .2s,background .2s;text-align:center}
.rot-card:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.rot-card.selected{border-color:var(--roxo-esc);background:rgba(175,169,236,.12)}
.rot-emoji{font-size:1.7rem;display:block;margin-bottom:6px}
.rot-card h4{font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;color:var(--azul-deep);margin-bottom:3px}
.rot-card p{font-size:.77rem;color:var(--texto-sec)}

/* ESTILO VISUAL vs NARRATIVO */
.estilo-wrap{margin-top:20px}
.estilo-titulo{font-size:.85rem;font-weight:800;color:var(--texto);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.estilo-auto-badge{background:linear-gradient(135deg,var(--azul-esc),var(--roxo-esc));color:white;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px}
.estilo-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.estilo-card{border:2px solid var(--borda);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center}
.estilo-card:hover{border-color:var(--azul-cl);background:var(--azul-pal)}
.estilo-card.visual.selected{border-color:var(--rosa-esc);background:rgba(237,147,177,.1)}
.estilo-card.narrativo.selected{border-color:var(--roxo-esc);background:rgba(127,119,221,.1)}
.estilo-emoji{font-size:2rem;display:block;margin-bottom:8px}
.estilo-card h4{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;color:var(--azul-deep);margin-bottom:4px}
.estilo-card p{font-size:.78rem;color:var(--texto-sec);line-height:1.5}
.badge-visual{background:rgba(212,83,126,.15);color:var(--rosa-esc);font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:8px}
.badge-narrativo{background:rgba(127,119,221,.15);color:var(--roxo-esc);font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:8px}

/* INPUTS */
.campo-label{display:block;font-size:.88rem;font-weight:700;color:var(--texto);margin-bottom:8px}
textarea,input[type="text"],input[type="email"]{width:100%;border:2px solid var(--borda);border-radius:12px;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--texto);resize:vertical;transition:border-color .2s;background:#fff;outline:none}
textarea{min-height:110px}
textarea:focus,input:focus{border-color:var(--azul)}
.campo-group{margin-bottom:18px}
.campo-hint{font-size:.8rem;color:var(--texto-sec);margin-top:6px}
.contador{font-size:.8rem;color:var(--texto-sec);text-align:right;margin-top:4px}

/* LOADING */
.loading-wrap{text-align:center;padding:44px 0}
.loading-spinner{width:52px;height:52px;border:4px solid var(--azul-cl);border-top-color:var(--azul-esc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:var(--azul-deep);margin-bottom:6px}
.loading-sub{font-size:.88rem;color:var(--texto-sec)}
.loading-estilo{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:8px 18px;border-radius:50px;font-size:.82rem;font-weight:700}
.loading-estilo.visual{background:rgba(212,83,126,.12);color:var(--rosa-esc)}
.loading-estilo.narrativo{background:rgba(127,119,221,.12);color:var(--roxo-esc)}

/* TELA DE REVISAO */
.revisao-titulo{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--azul-deep);margin:28px 0 14px;display:flex;align-items:center;gap:10px}
.revisao-titulo:first-child{margin-top:0}
.revisao-sep{border:none;border-top:1.5px solid var(--borda);margin:28px 0}

/* AVATARES SQUISH */
.avatares-grid{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px}
.avatar-item{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:90px}
.avatar-foto-wrap{position:relative;width:80px;height:80px}
.avatar-foto-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2.5px solid var(--azul-cl)}
.avatar-squish-wrap{width:80px;height:80px;border-radius:50%;overflow:hidden;border:2.5px solid var(--borda)}
.avatar-nome{font-size:.8rem;font-weight:700;color:var(--azul-deep);text-align:center}
.avatar-papel{font-size:.7rem;color:var(--texto-sec);text-align:center}
.avatar-tabs{display:flex;gap:6px;margin-bottom:12px}
.avatar-tab{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid var(--borda);background:white;color:var(--texto-sec);transition:all .2s}
.avatar-tab.active{background:var(--azul-esc);border-color:var(--azul-esc);color:white}

/* PREVIEW LIVRO */
.livro-preview{border-radius:20px;padding:22px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.livro-preview.visual{background:linear-gradient(135deg,#ffe8f3,#f0e8ff)}
.livro-preview.narrativo{background:linear-gradient(135deg,#e6f1fb,#e8e5ff)}
.lp-emoji{font-size:2rem;display:block;margin-bottom:8px;position:relative}
.lp-titulo{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--azul-deep);margin-bottom:4px;position:relative}
.lp-sub{font-size:.84rem;color:var(--texto-sec);position:relative}
.lp-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:20px;font-size:.73rem;font-weight:800;position:relative}
.lp-badge.visual{background:rgba(212,83,126,.15);color:var(--rosa-esc)}
.lp-badge.narrativo{background:rgba(127,119,221,.15);color:var(--roxo-esc)}

/* REGENERAR */
.regen-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:var(--cinza);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.regen-info{font-size:.85rem;color:var(--texto-sec)}
.regen-info strong{color:var(--azul-deep)}
.regen-btn{padding:8px 18px;border-radius:50px;background:white;border:1.5px solid var(--borda);font-family:'Baloo 2',cursive;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--azul-esc);transition:all .2s;display:flex;align-items:center;gap:6px}
.regen-btn:hover:not(:disabled){border-color:var(--azul);background:var(--azul-pal)}
.regen-btn:disabled{opacity:.4;cursor:not-allowed}
.tentativas-dots{display:flex;gap:4px}
.tentativa-dot{width:8px;height:8px;border-radius:50%;background:var(--verde)}
.tentativa-dot.usada{background:var(--borda)}

/* PAGINAS VISUAIS */
.pags-visuais{display:flex;flex-direction:column;gap:14px;margin-bottom:4px}
.pv{border:1.5px solid var(--borda);border-radius:16px;overflow:hidden}
.pv-header{padding:12px 18px;display:flex;align-items:center;gap:12px;background:var(--cinza)}
.pv-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--rosa-esc),var(--roxo-esc));color:white;font-size:.78rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pv-tit{font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;color:var(--azul-deep)}
.pv-body{padding:16px 18px;display:flex;align-items:flex-start;gap:16px}

async function verificarQualidadeFoto(file,id){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var w=img.width, h=img.height;
      var problemas=[];
      if(w<100||h<100) problemas.push('Foto muito pequena — use uma foto maior');
      if(w/h>3||h/w>4) problemas.push('Proporção estranha — prefira foto de rosto');
      try{
        var canvas=document.createElement('canvas');
        canvas.width=Math.min(w,200); canvas.height=Math.min(h,200);
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        var data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
        var total=0, px=data.length/4;
        for(var i=0;i<data.length;i+=4) total+=(data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114);
        var brilho=total/px;
        if(brilho<40) problemas.push('Foto muito escura — tente com mais luz');
        else if(brilho>230) problemas.push('Foto muito clara/estourada');
      }catch(e){}
      if(problemas.length>0) mostrarAvisoFoto(problemas,id);
      resolve();
    };
    img.onerror=function(){ resolve(); };
    img.src=URL.createObjectURL(file);
  });
}

async function gerarAvatarDalle(p){
  // Converte e REDIMENSIONA foto para base64 (max 512px para nao estourar o limite da function)
  var imageUrl = null;
  if(p.fotoUrl && p.fotoUrl.startsWith('blob:')){
    try{
      var blob = await fetch(p.fotoUrl).then(function(r){return r.blob();});
      imageUrl = await new Promise(function(res){
        var img = new Image();
        img.onload = function(){
          var MAX = 512;
          var w = img.width, h = img.height;
          if(w > MAX || h > MAX){
            if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = function(){ res(null); };
        img.src = URL.createObjectURL(blob);
      });
    }catch(e){ imageUrl = null; }
  }

  // Expressao baseada no papel E no roteiro da historia
  var roteiro = ST.roteiro || 'aventura';
  var expressao;
  if(p.papel === 'protagonista'){
    if(roteiro === 'terror') expressao = 'brave but slightly scared expression, wide determined eyes, nervous half-smile';
    else if(roteiro === 'aventura') expressao = 'heroic and excited expression, confident bright eyes, big adventurous smile';
    else if(roteiro === 'magia') expressao = 'magical wonder-filled expression, sparkling starry eyes, amazed open smile';
    else if(roteiro === 'sonho') expressao = 'dreamy and hopeful expression, soft glowing eyes, gentle confident smile';
    else expressao = 'warm and joyful expression, bright eyes, big happy smile';
  } else if(p.papel === 'familiar'){
    expressao = 'warm and loving expression, kind gentle eyes, caring protective smile';
  } else if(p.papel === 'amigo'){
    if(roteiro === 'terror') expressao = 'mischievous and playful expression, wide excited eyes, cheeky grin';
    else expressao = 'friendly and cheerful expression, happy eyes, big energetic smile';
  } else if(p.papel === 'pet'){
    expressao = 'adorable animal, happy excited eyes, tongue out, full of energy';
  } else {
    if(roteiro === 'terror') expressao = 'spooky mysterious villain expression, dramatic wide eyes, eerie grin, menacing but still cute chibi style';
    else expressao = 'unique expressive character, friendly curious eyes, charming smile';
  }

  // Paleta de cores Squishbook por papel
  var cor = {
    protagonista: 'sky blue, golden yellow and white',
    familiar: 'soft rose pink, warm cream and lilac',
    amigo: 'purple, lavender and mint',
    pet: 'warm brown, cream and forest green',
    outro: roteiro === 'terror' ? 'dark purple, midnight blue and ghostly white' : 'orange, peach and yellow'
  }[p.papel] || 'pastel multicolor';

  // Tipo de personagem: humano ou animal
  var ehPet = p.papel === 'pet';

  var descFisica = '';

  // --- FONTE DE VERDADE: campos explícitos do formulário ---
  var faixaExp=p.faixaEtaria||'';
  var generoExp=p.genero||'';
  var ehAdultoExp=(faixaExp==='adulto'||faixaExp==='idoso');

  var faixaDesc='';
  if(faixaExp==='bebe') faixaDesc='BABY character, very young toddler, round baby face, chubby cheeks, ';
  else if(faixaExp==='crianca') faixaDesc='CHILD character, young kid aged 4-8, child proportions, ';
  else if(faixaExp==='adolescente') faixaDesc='TEENAGER character, pre-teen to teen, taller than a child, youthful face, ';
  else if(faixaExp==='adulto') faixaDesc='ADULT character, mature adult face with adult proportions, clearly NOT a child, NOT a baby NOT an infant, adult chibi style, ';
  else if(faixaExp==='idoso') faixaDesc='ELDERLY character, senior adult with mature face, gentle wrinkles, adult proportions, clearly NOT a child, ';

  var generoDescAv='';
  if(generoExp==='masculino') generoDescAv=ehAdultoExp?'male man, masculine face and features, ':'boy, masculine features, ';
  else if(generoExp==='feminino') generoDescAv=ehAdultoExp?'female woman, feminine face and features, ':'girl, feminine features, ';

  var temFoto = !!imageUrl;

  if(faixaExp){
    descFisica = faixaDesc + generoDescAv;
  } else {
    // Fallback heurístico (comportamento antigo)
    var nomesAdultos = ['pai','papai','papa','mae','mamae','mama','tio','tia','vovo','vovô','vovó','avo','avô','avó','irmao','irmã','irma','primo','prima','amigo','amiga','padrinho','madrinha','professor','professora'];
    var nomeAdulto = false;
    if(p.nome){
      var nomeLower = p.nome.toLowerCase();
      for(var ni=0;ni<nomesAdultos.length;ni++){
        if(nomeLower.indexOf(nomesAdultos[ni])>=0){ nomeAdulto=true; break; }
      }
    }
    var papelAdulto = (p.papel==='familiar'||p.papel==='amigo'||p.papel==='outro');

    if(p.papel === 'protagonista'){
      if(ST.idadeCrianca && parseInt(ST.idadeCrianca) <= 8){
        descFisica = 'young child approximately '+ST.idadeCrianca+' years old, small and cute, ';
      } else if(ST.idadeCrianca){
        descFisica = 'child approximately '+ST.idadeCrianca+' years old, ';
      }
      if(generoDescAv) descFisica += generoDescAv;
    } else if(nomeAdulto || papelAdulto){
      var generoAv=generoDescAv;
      if(!generoAv){
        var nomesMascAv=['pai','papai','papa','tio','irmao','primo','vovo','avô','padrinho','professor'];
        var nomesFemAv=['mae','mamae','tia','irma','prima','vovó','madrinha','professora'];
        if(p.nome){
          var nLav=p.nome.toLowerCase();
          for(var gma=0;gma<nomesMascAv.length;gma++){if(nLav.indexOf(nomesMascAv[gma])>=0){generoAv='male man, masculine face and features, ';break;}}
          if(!generoAv){for(var gfa=0;gfa<nomesFemAv.length;gfa++){if(nLav.indexOf(nomesFemAv[gfa])>=0){generoAv='female woman, feminine face and features, ';break;}}}
        }
      }
      descFisica = 'ADULT character, '+generoAv+'mature face with adult proportions, NOT a baby NOT an infant, adult chibi style, ';
    }
  }

  var prompt;
  if(ehPet){
    prompt = 'Squishbook style kawaii chibi animal character. '
      + 'A super cute adorable fluffy pet animal. '
      + expressao + '. '
      + 'Squishbook signature art style: ultra soft squishy plush doll, '
      + 'oversized glossy eyes with sparkle, chubby body, tiny nose, '
      + cor + ' color palette, pastel colors, fluffy plush texture, '

      + 'high quality childrens book illustration. '
      + 'NO text, NO watermark, NO background glow, NO circular border.';
  } else {
    // v4.2: prompt reescrito para FLUX.2 multi-reference.
    // Mantido o essencial: descri\u00e7\u00e3o com idade/g\u00eanero + expres\u00e3o + fundo branco.
    // Estilo mudado de "plush doll" para "watercolor" (unifica com livro).
    prompt = 'Transform the person from @image1 into a chibi kawaii watercolor character for a children\'s book. '
      + 'Full body portrait, centered in frame, from head to feet visible. '
      + descFisica
      + 'Preserve face, hair, skin tone and distinctive features exactly from the reference photo. '

      + 'Soft pastel watercolor children\'s book illustration, chibi proportions with big glossy eyes and rosy cheeks. '
      + cor + ' clothing and accent colors. '
      + 'PURE WHITE BACKGROUND only, no glow, no gradient, no border. '
      + 'No text, no watermark.';
  }

  try{
    // v4.2 (24/04/26): migrado pulid → FLUX.2 [pro] edit para unificar estilo

    var model, body;
    if(!ehPet && imageUrl){
      // Humano com foto: FLUX.2 multi-reference (1 foto \u00e9 v\u00e1lido)
      model = MOTOR_V4;
      body = {
        prompt: prompt,
        image_urls: [imageUrl],
        image_size: 'square_hd'
      };
    } else {
      // Pet ou sem foto: fallback em flux-pro puro
      model = 'fal-ai/flux-pro';
      body = {
        prompt: TRIGGER+' '+prompt,
        num_images: 1,
        image_size: 'square_hd',
        loras: [{path:LORA_URL, scale:LORA_SCALE}]
      };
    }
    var ctrl=new AbortController();
    var tmout=setTimeout(function(){ctrl.abort();}, ehPet ? 45000 : 120000);
    var res = await fetch('https://squishbook-backend-v2.onrender.com/api/avatar', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:model,payload:body}),
      signal:ctrl.signal
    });
    clearTimeout(tmout);
    var data = await res.json();
    var url = data.images && data.images[0] && data.images[0].url;
    if(url){ 
      p.avatarUrl=url;
      p.avatarErro=false;
      p.avatarErroMsg='';
      // Salva prompt base e caracteristicas para reusar nas cenas
      // As cenas vao usar esse mesmo prompt + avatarUrl como referencia de estilo
      p.promptBase = ehPet
        ? ('Squishbook style kawaii chibi animal character, '+descFisica+cor+' color palette. ')
        : ('Squishbook style chibi character. '+descFisica
          +'Squishbook art style: ultra soft squishy human plush doll character, '
          +'oversized glossy eyes with sparkle highlights, chubby round human face, rosy cheeks, '
          +'big head small body chibi proportions, '+cor+' clothing and accent colors. ');
      p.ehPet=ehPet;
      p.cor=cor;
    } else {
      p.avatarErro=true;
      // Detecta erro específico de rosto não detectado (foto ruim)
      var errMsg = (data && (data.detail||data.error||data.message)) || '';
      if(typeof errMsg === 'object') errMsg = JSON.stringify(errMsg);
      errMsg = String(errMsg).toLowerCase();
      if(errMsg.indexOf('no face detected')>=0 || errMsg.indexOf('face detection')>=0 || errMsg.indexOf('facexlib')>=0 || errMsg.indexOf('align face fail')>=0){
        p.avatarErroMsg = 'foto_sem_rosto';
      } else {
        p.avatarErroMsg = 'erro_geral';
      }
    }
  }catch(e){
    p.avatarErro=true;
    p.avatarErroMsg='erro_geral';
  }
  var g=document.getElementById('avatarGrid'); if(!g) return;
  var papelLabel=PAPEIS.filter(function(r){return r.v===p.papel;})[0].l;

      items[i].innerHTML=conteudo+'<div class="avatar-nome">'+p.nome+'</div><div class="avatar-papel">'+papelLabel+'</div>';
      break;
    }
  }
  // Atualiza UI de bloqueio do botão Continuar
  atualizarBloqueioRevisao();
}

// Bloqueia botão "Continuar" na revisão se alguma foto falhou por rosto não detectado
function atualizarBloqueioRevisao(){
  var alertBox=document.getElementById('fotoAlertBox');
  var btn=document.getElementById('btnContinuarS5');
  if(!alertBox||!btn) return;
  var comErro=ST.personagens.filter(function(p){
    return p.avatarErro && p.avatarErroMsg==='foto_sem_rosto';
  });
  if(comErro.length>0){
    var nomes=comErro.map(function(p){return '<strong>'+(p.nome||'Personagem')+'</strong>';}).join(', ');
    alertBox.style.display='block';
    alertBox.innerHTML='<div style="background:#FEF2F2;border:2px solid #EF4444;border-radius:14px;padding:14px 18px;margin-bottom:14px">'
      +'<div style="font-size:.95rem;font-weight:800;color:#B91C1C;margin-bottom:6px">📸 A foto de '+nomes+' não funcionou</div>'
      +'<div style="font-size:.82rem;color:#7F1D1D;line-height:1.55;margin-bottom:10px">Não conseguimos detectar o rosto. Troque por uma foto <strong>sem óculos escuros, sem chapéu cobrindo a testa, rosto de frente e bem iluminado</strong>.</div>'
      +'<button onclick="voltarParaCorrigirFoto()" style="background:#EF4444;color:white;border:none;padding:10px 18px;border-radius:25px;font-weight:800;cursor:pointer;font-size:.85rem;font-family:Nunito,sans-serif">Voltar e trocar a foto</button>'
      +'</div>';
    btn.disabled=true;
    btn.style.opacity='0.4';
    btn.style.cursor='not-allowed';
    btn.title='Troque a foto com problema antes de continuar';
  } else {
    alertBox.style.display='none';
    alertBox.innerHTML='';
    btn.disabled=false;
    btn.style.opacity='';
    btn.style.cursor='';
    btn.title='';
  }
}

async function buscarCep(cep){
  var c=cep.replace(/\D/g,'');
  if(c.length!==8) return;
  var status=document.getElementById('cepStatus');
  if(status) status.textContent='Buscando...';
  try{
    var r=await fetch('https://viacep.com.br/ws/'+c+'/json/');
    var d=await r.json();
    if(d.erro){if(status)status.textContent='CEP não encontrado.';return;}
    ST.endereco.logradouro=d.logradouro||'';
    ST.endereco.bairro=d.bairro||'';
    ST.endereco.cidade=d.localidade||'';
    ST.endereco.estado=d.uf||'';
    var inpL=document.getElementById('inpLogradouro');
    var inpB=document.getElementById('inpBairro');
    var inpC=document.getElementById('inpCidade');
    var inpE=document.getElementById('inpEstado');
    if(inpL) inpL.value=ST.endereco.logradouro;
    if(inpB) inpB.value=ST.endereco.bairro;
    if(inpC) inpC.value=ST.endereco.cidade;
    if(inpE) inpE.value=ST.endereco.estado;
    if(status) status.textContent='✅ CEP encontrado!';
    // Foca no campo número
    var inpN=document.getElementById('inpNumero');
    if(inpN) setTimeout(function(){inpN.focus();},100);
  }catch(e){
    if(status) status.textContent='Erro ao buscar CEP.';
  }
}

function mostrarGerando(c){
  var etapas=[
    {id:'e1',txt:'Preparando os personagens com carinho...', tempo:30},
    {id:'e2',txt:'Ilustrando cada pagina da historia...', tempo:90},
    {id:'e3',txt:'Seu presente esta ficando lindo!', tempo:20},
    {id:'e4',txt:'Montando o livro com todo o amor...', tempo:15},
    {id:'e5',txt:'Quase pronto! Finalizando...', tempo:10}
  ];
  var tempoTotal=240; // segundos estimados (6 paginas + avatares secundarios)
  var tempoInicio=Date.now();
  var etHtml='';
  for(var i=0;i<etapas.length;i++){
    etHtml+='<div class="et" id="'+etapas[i].id+'">'
      +'<div class="et-ico">'+(i+1)+'</div>'
      +etapas[i].txt+'</div>';
  }
  // Mensagens rotativas de tranquilidade
  var msgs=['Estamos criando algo especial para voce...','Cada detalhe sendo preparado com cuidado...','Seu presente unico no mundo esta quase pronto...','A magia esta acontecendo agora...'];
  var msgIdx=0;
  var msgIv=setInterval(function(){
    msgIdx=(msgIdx+1)%msgs.length;
    var el=document.getElementById('loadingMsg');
    if(el) el.textContent=msgs[msgIdx];
    else clearInterval(msgIv);
  },4000);

  c.innerHTML='<div class="gerando-cenas">'
    +'<div class="loading-txt" style="margin-bottom:4px">Criando seu Squishbook...</div>'
    +'<div class="loading-sub" id="loadingMsg" style="margin-bottom:16px">Estamos criando algo especial para voce...</div>'
    +'<div id="progressBarWrap" style="width:100%;background:var(--borda);border-radius:50px;height:10px;margin-bottom:6px;overflow:hidden"><div id="progressBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--azul-esc),var(--roxo-esc));border-radius:50px;transition:width .5s ease"></div></div>'
    +'<div id="progressInfo" style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--texto-sec);margin-bottom:20px"><span id="progressPct">0%</span><span id="progressTimer">~2min restantes</span></div>'
    +'<div class="gerando-etapas">'+etHtml+'</div>'
    +'</div>';
  // Inicia timer de progresso
  var progressIv=setInterval(function(){
    var elapsed=(Date.now()-tempoInicio)/1000;
    var pct=Math.min(95,Math.round(elapsed/tempoTotal*100));
    var restante=Math.max(0,Math.round((tempoTotal-elapsed)));
    var el=document.getElementById('progressBar');
    var pelEl=document.getElementById('progressPct');
    var tmEl=document.getElementById('progressTimer');
    if(el) el.style.width=pct+'%';
    if(pelEl) pelEl.textContent=pct+'%';
    if(tmEl) tmEl.textContent=restante>0?'~'+restante+'s restantes':'Finalizando...';
  },500);
}

async function ativarEtapa(id){
  var el=document.getElementById(id); if(!el)return;
  // Marca anterior como feita
  var all=['e1','e2','e3','e4','e5'];
  var idx=all.indexOf(id);
  if(idx>0){
    var prev=document.getElementById(all[idx-1]);
    if(prev){prev.className='et feita';prev.querySelector('.et-ico').textContent='\u2713';}
  }
  el.className='et ativa';
  await new Promise(function(r){setTimeout(r,300);});
}

async function gerarCenas(){
  POS.cenasGeradas=[];

  await ativarEtapa('e1');

  // ETAPA 1: Gera avatares dos personagens secundarios que ainda nao tem avatar
  // Isso garante que gerarCenaPagina tenha avatarUrl disponivel para todos
  var secsemAvatar=ST.personagens.filter(function(p){return p.papel!=='protagonista'&&!p.avatarUrl&&!p.avatarErro;});
  if(secsemAvatar.length>0){
    var avPromises=secsemAvatar.map(function(p){return gerarAvatarDalle(p);});
    await Promise.all(avPromises);
  }

  // Determina número de páginas: 12 para impresso, 6 para digital
  var totalPaginasAlvo = (ST.formato==='impresso') ? 12 : 6;
  var paginas=[];
  if(ST.estiloFinal==='visual'&&ST.historia.paginas&&ST.historia.paginas.length>=totalPaginasAlvo){
    paginas=ST.historia.paginas;
  } else if(ST.estiloFinal==='visual'&&ST.historia.paginas&&ST.historia.paginas.length>0){
    // Se tem menos páginas que o alvo, duplica as existentes com variações
    paginas=ST.historia.paginas;
    while(paginas.length<totalPaginasAlvo){
      var base=paginas[paginas.length%ST.historia.paginas.length];
      paginas=paginas.concat([{num:paginas.length+1,titulo:base.titulo+' (continuação)',texto:base.texto}]);
    }
    paginas=paginas.slice(0,totalPaginasAlvo);
  } else {
    // Monta 6 paginas a partir dos 3 blocos narrativos
    var blocos=[];
    var ini=(ST.historia.inicio||'').split('\n\n').filter(function(b){return b.trim().length>10;});
    var mei=(ST.historia.meio||'').split('\n\n').filter(function(b){return b.trim().length>10;});
    var fim=(ST.historia.fim||'').split('\n\n').filter(function(b){return b.trim().length>10;});
    // 2 paginas do inicio, 2 do meio, 2 do fim
    paginas=[
      {num:1,titulo:'O começo',texto:(ini[0]||'')+(ini[1]?'\n\n'+ini[1]:'')},
      {num:2,titulo:'A descoberta',texto:(ini[2]||mei[0]||'')+(ini[3]||mei[1]?'\n\n'+(ini[3]||mei[1]):'')},
      {num:3,titulo:'O desafio',texto:(mei[0]||'')+(mei[1]?'\n\n'+mei[1]:'')},
      {num:4,titulo:'O momento decisivo',texto:(mei[2]||mei[1]||'')+(mei[3]?'\n\n'+mei[3]:'')},
      {num:5,titulo:'A superação',texto:(fim[0]||'')+(fim[1]?'\n\n'+fim[1]:'')},
      {num:6,titulo:'O final feliz',texto:(fim[2]||fim[1]||'')+(fim[3]?'\n\n'+fim[3]:'')},
    ];
    paginas=paginas.filter(function(pg){return pg.texto&&pg.texto.trim().length>20;});
  }

  await ativarEtapa('e2');

  // ETAPA 2: Gera cenas 1 por vez com retry automatico em caso de falha
  for(var b=0;b<paginas.length;b++){
    var resultado=await gerarCenaPaginaComRetry(paginas[b],b);
    POS.cenasGeradas.push(resultado);
  }

  // FIX BUG 1 (CRÍTICO): bloqueio de entrega se QUALQUER cena falhou.
  // Antes o sistema mostrava "Presente enviado!" mesmo com cenas com erro.
  var cenasFalhadas = POS.cenasGeradas.filter(function(r){return r.erro===true || !r.url;});
  var cenasFallback = POS.cenasGeradas.filter(function(r){return r.fallback===true;});

  if(cenasFalhadas.length > 0){
    logGeracao({tipo:'sessao',status:'bloqueado_cenas_falhadas',erro_msg:'Falharam '+cenasFalhadas.length+' de '+POS.cenasGeradas.length+' cenas'});
    mostrarErroGeracao(cenasFalhadas, 'cenas_falhadas');
    throw new Error('GERACAO_BLOQUEADA_CENAS_FALHADAS');
  }

  // Se há cenas que caíram no fallback genérico (sem personagens corretos), avisa mas permite seguir
  if(cenasFallback.length > 0){
    logGeracao({tipo:'sessao',status:'aviso_fallback',erro_msg:cenasFallback.length+' cenas em fallback'});
    var prosseguir = await mostrarAvisoQualidade(cenasFallback);
    if(!prosseguir){
      throw new Error('GERACAO_CANCELADA_USUARIO');
    }
  }

  await ativarEtapa('e3');
  await new Promise(function(r){setTimeout(r,400);});
  await ativarEtapa('e4');
  await new Promise(function(r){setTimeout(r,400);});
  await ativarEtapa('e5');

  var ult=document.getElementById('e5');
  if(ult){ult.className='et feita';ult.querySelector('.et-ico').textContent='\u2713';}
  // Completa a barra
  if(typeof progressIv!=='undefined') clearInterval(progressIv);
  var pb=document.getElementById('progressBar');
  var pp=document.getElementById('progressPct');
  var pt=document.getElementById('progressTimer');
  if(pb) pb.style.width='100%';
  if(pp) pp.textContent='100%';
  if(pt) pt.textContent='Pronto!';
  await new Promise(function(r){setTimeout(r,400);});
}

      if(!generoDesc){for(var gf=0;gf<nomesFemCena.length;gf++){if(nLg.indexOf(nomesFemCena[gf])>=0){generoDesc=ehAdulto?'female woman, feminine features, ':'girl, feminine features, ';break;}}}
      if(!generoDesc){
        var primeiroNome=nLg.split(' ')[0];
        var terminacaoMasc=['marcelo','carlos','paulo','joao','joão','pedro','lucas','rafael','felipe','gabriel',
          'antonio','antônio','roberto','luis','luís','francisco','jose','josé','mario','mário',

        var terminacaoFem=['fran','franciely','maria','ana','julia','júlia','patricia','patrícia',
          'mariana','fernanda','amanda','camila','gabriela','leticia','letícia','beatriz',
          'isabela','isabella','carolina','carina','claudia','cláudia','vanessa','jessica',
          'jéssica','priscila','renata','sabrina','tatiana','tatiane','veronica','verónica',
          'katia','kátia','lucia','lúcia','monica','mônica','sonia','sônia','vera','helena',

// Extrai TUDO da cena em uma única chamada: cenário + objetos narrativos + ação específica + personagens presentes
// Retorna: { cenario:'...', objetos:[{nome,tipo,descricao}], acao:'...', personagensPresentes:['Nome1','Nome2'] }
async function extrairElementosDaCena(texto, titulo, roteiro, personagensCadastrados){
  var fallbacks={
    diadasmaes:'beautiful spring garden with blooming flowers, warm afternoon sunlight, soft pastel colors and gentle breeze',
    aventura:'lush enchanted forest trail with ancient trees, magical glowing mushrooms and golden sunrays',
    amizade:'sunny colorful playground with swings, slides and bright flowers in warm afternoon light',
    familia:'warm cozy living room with soft sofa, family photos on wall, fireplace and colorful rugs',
    magia:'magical sparkling castle hall with floating crystals, glowing orbs and starry vaulted ceiling',
    animal:'peaceful sunlit meadow with tall grass, wildflowers and a winding stream through rolling hills',
    sonho:'dreamy cloudscape with fluffy pink clouds, floating islands and soft pastel sky at golden hour',
    terror:'spooky moonlit forest clearing with twisted trees, glowing fog and eerie purple shadows'
  };
  var fallbackCenario=fallbacks[roteiro]||fallbacks.familia;
  var fallbackObj={cenario:fallbackCenario, objetos:[], acao:'', personagensPresentes:(personagensCadastrados||[]).map(function(p){return p.nome;})};

  var listaCad=(personagensCadastrados||[]).map(function(p){return p.nome+' ('+p.papel+')';}).join(', ');
  try{
    var prompt='You are analyzing a page of a childrens book to help an image generator create an accurate illustration. Return a JSON object with 4 fields.\n\n'
      +'Page title: '+titulo+'\n'
      +'Page text: '+texto+'\n'
      +'Story theme: '+roteiro+'\n'
      +'Registered characters (these are the REAL people in the book, each with their own photo reference): '+listaCad+'\n\n'
      +'Return ONLY valid JSON (no markdown fences, no preamble). Schema:\n'
      +'{\n'
      +'  "cenario": "one short English sentence (max 20 words) describing ONLY the background setting. NO characters, NO people. Example: cozy wooden bedroom with blue bedsheets and warm moonlight through window",\n'
      +'  "objetos": [ { "nome": "original Portuguese name from the text", "tipo": "stuffed_toy | toy | monster_imaginary | shadow | creature | magical_object | other", "descricao": "short English visual description, max 12 words. IMPORTANT: if tipo is stuffed_toy or toy, describe it as an INANIMATE OBJECT not a person. Example: brown plush teddy bear with red bow, inanimate stuffed toy, not a person" } ],\n'
      +'  "acao": "one short English sentence describing the specific action happening in THIS scene, using the registered character names. Max 25 words. Example: Beni holding a brown teddy bear in one hand and a red toy car in the other, tears on his face",\n'
      +'  "personagensPresentes": ["Name1", "Name2"]\n'
      +'}\n\n'
      +'Rules:\n'
      +'- personagensPresentes: ONLY include names from the registered characters list. Do NOT invent characters. If only the protagonist is mentioned, return only the protagonist.\n'
      +'- objetos: ONLY include things that are NOT registered characters but ARE visually important in this scene (toys, creatures, imaginary monsters, magical items, shadows described as characters). Leave empty [] if nothing relevant.\n'
      +'- If the text mentions a "monster", "shadow", "creature" that is actually imaginary or a misperception (revealed later as just a shadow), still describe it visually for THIS scene.\n'
      +'- acao: describe what is happening visually in THIS specific scene using action verbs. This is the most important field.\n'
      +'- cenario: CRITICAL: describe ONLY the physical environment (architecture, furniture, nature, lighting). NEVER describe or imply other people, children, visitors, bystanders, crowds, classmates, or families in the environment. If the original text mentions a "kids room" or "classroom" or "party", describe only the physical objects (beds, desks, decorations) without implying other people are there. The scene must feel like the empty environment that the registered characters will enter. Keep it simple: max 20 words.\n'
      +'- All text values (cenario, tipo, descricao, acao) must be in English. Only "nome" stays in Portuguese.\n';

    var res=await fetch('https://squishbook-backend-v2.onrender.com/api/historia',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok) return fallbackObj;
    var data=await res.json();
    var txt=data.content&&data.content[0]&&data.content[0].text;
    if(!txt) return fallbackObj;
    // Remove fences de markdown se vierem
    txt=txt.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    var parsed;
    try{ parsed=JSON.parse(txt); }catch(e){ return fallbackObj; }
    if(!parsed||typeof parsed!=='object') return fallbackObj;
    var out={
      cenario:(parsed.cenario&&typeof parsed.cenario==='string'&&parsed.cenario.trim().length>10)?parsed.cenario.trim().replace(/["""]/g,''):fallbackCenario,
      objetos:Array.isArray(parsed.objetos)?parsed.objetos.filter(function(o){return o&&o.descricao&&typeof o.descricao==='string';}).slice(0,5):[],
      acao:(parsed.acao&&typeof parsed.acao==='string')?parsed.acao.trim().replace(/["""]/g,''):'',
      personagensPresentes:Array.isArray(parsed.personagensPresentes)?parsed.personagensPresentes.filter(function(n){return typeof n==='string';}):[]
    };
    return out;
  }catch(e){ return fallbackObj; }
}

// Detecta gênero e faixa etária de um personagem a partir dos campos do cadastro.
// Prioridade: campos explícitos (genero + faixaEtaria). Fallback: heurística por nome + papel.
// Versão global, compartilhada entre helpers v4 e código legado interno.
function detectaGeneroFaixa(p){
  var g='', f='';
  // gênero
  if(p.genero==='masculino') g='male';
  else if(p.genero==='feminino') g='female';
  else {
    var nomeL=(p.nome||'').toLowerCase();
    var nomesFem=['ana','sofia','valentina','alice','julia','laura','isabela','maria','gabriela','beatriz','leticia','manuela','heloisa','camila','fernanda','clara','livia','vitoria','lorena','bruna','aline','paula','elisa','lara','luna','isis','maya','mia','mae','mamae','vovo','tia'];
  var nomesMasc=['papai','pai','vovo','tio','avo'];
    if(nomesFem.some(function(n){return nomeL.startsWith(n);})) g='female';
    else if(nomesMasc.some(function(n){return nomeL.indexOf(n)>=0;})) g='male';
    else if(nomeL.endsWith('a')) g='female';
    else g='male';
  }
  // faixa etária
  if(p.faixaEtaria==='bebe') f='baby/toddler';
  else if(p.faixaEtaria==='crianca') f='child';
  else if(p.faixaEtaria==='adolescente') f='teenager';
  else if(p.faixaEtaria==='adulto') f='adult';
  else if(p.faixaEtaria==='idoso') f='elderly';
  else {
    if(p.papel==='protagonista') f='child';
    else if(p.papel==='familiar') f='adult';
    else f='child';
  }
  return {genero: g, faixa: f};
}

// Converte blob: URL (upload do usuário) em data URL base64 redimensionada.
// FLUX.2 aceita data URL diretamente em image_urls[], sem upload intermediário.
async function fotoParaDataUrl(fotoUrl, maxPx){
  if(!fotoUrl) return null;
  var MAX = maxPx || FOTO_MAX_PX;
  // Se já é data URL e está no tamanho certo, devolve como está
  if(fotoUrl.indexOf('data:')===0) return fotoUrl;
  try{
    var blob = await fetch(fotoUrl).then(function(r){return r.blob();});
    return await new Promise(function(res){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        if(w > MAX || h > MAX){
          if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL('image/jpeg', 0.9));
      };
      img.onerror = function(){ res(null); };
      img.src = URL.createObjectURL(blob);
    });
  }catch(e){ return null; }
}

// Filtra cenário contra blacklist de composições que alucinam terceiro personagem.
// Descoberto nos Testes 4 e 4B: sofá+livro vira 3 pessoas no FLUX.2.
function filtrarCenarioV4(cenario, qtdPersonagens){
  if(!cenario || qtdPersonagens < 2) return cenario;
  for(var i=0; i<CENARIOS_BLOQUEADOS.length; i++){
    var regra = CENARIOS_BLOQUEADOS[i];
    if(regra.regex.test(cenario)){
      // Substitui o termo perigoso pelo alternativo
      return cenario.replace(regra.regex, regra.alternativo);
    }
  }
  return cenario;
}

// Descrição enxuta de um personagem para o prompt FLUX.2.
// NÃO hardcoda features físicas (barba/óculos/tatuagem) — FLUX.2 extrai da foto.
// Apenas ancora idade e gênero explicitamente, que foi o que os 6 testes validaram.
function descricaoPersonagemV4(p){
  var gf = detectaGeneroFaixa(p);
  var base = '';
  if(gf.faixa==='baby/toddler') base = gf.genero==='female' ? 'a baby girl' : 'a baby boy';
  else if(gf.faixa==='child') base = gf.genero==='female' ? 'a young girl' : 'a young boy';
  else if(gf.faixa==='teenager') base = gf.genero==='female' ? 'a teenage girl' : 'a teenage boy';
  else if(gf.faixa==='adult') base = gf.genero==='female' ? 'an adult woman' : 'an adult man';
  else if(gf.faixa==='elderly') base = gf.genero==='female' ? 'an elderly woman' : 'an elderly man';
  else base = gf.genero==='female' ? 'a female person' : 'a male person';

  // Adiciona papel se for familiar/amigo (contexto que ajuda o modelo)
  var papel = '';
  if(p.papel==='familiar'){
    if(gf.faixa==='adult' && gf.genero==='female') papel=' (a mother)';
    else if(gf.faixa==='adult' && gf.genero==='male') papel=' (a father)';
    else if(gf.faixa==='elderly' && gf.genero==='female') papel=' (a grandmother)';
    else if(gf.faixa==='elderly' && gf.genero==='male') papel=' (a grandfather)';
  }
  return base + papel + ', preserve face and features exactly';
}

// Detecta se a cena precisa de reforço de escala (adulto + criança juntos).
// Descoberto no Teste 3: sem reforço explícito, Mamãe vira adolescente em cenas dinâmicas.
function reforcoEscalaV4(personagens){
  if(personagens.length < 2) return '';
  var gfs = personagens.map(detectaGeneroFaixa);
  var temAdulto = gfs.some(function(g){return g.faixa==='adult' || g.faixa==='elderly';});
  var temCrianca = gfs.some(function(g){return g.faixa==='child' || g.faixa==='baby/toddler';});
  if(temAdulto && temCrianca){
    return ' The adult has mature adult body proportions and is clearly taller than the child, who reaches only to the adult\'s waist or hip level.';
  }
  return '';
}

// Monta o prompt completo para o FLUX.2 [pro] edit.
// Template validado nos Testes 1, 2, 5 e 6 (6/7 testes passaram; Teste 4B falhou por cenário).
function construirPromptV4(parsNaPg, cenario, acao, expressao, roteiro, atmosfera){
  // @image1 é sempre o protagonista; @image2 (se houver) é o secundário com foto
  var refs = [];
  var imagens = [];
  for(var i=0; i<parsNaPg.length && i<2; i++){
    var p = parsNaPg[i];
    var tag = '@image' + (i+1);
    refs.push(tag + ' is ' + descricaoPersonagemV4(p));
    imagens.push(p); // usado depois para montar image_urls[]
  }

  var cenaTexto = '';
  if(parsNaPg.length === 1){
    cenaTexto = 'Transform the person from ' + refs[0].split(' is ')[0] + ' into a chibi kawaii watercolor character. ';
    cenaTexto += acao + '. ';
    cenaTexto += 'Setting: ' + cenario + '. ';
    cenaTexto += refs[0] + '. ';
    // Sess\u00e3o 3 (24/04): constraint positivo de quantidade exata.
    // Afirma\u00e7\u00e3o funciona melhor que nega\u00e7\u00e3o em modelos de difus\u00e3o.
    cenaTexto += 'The illustration shows exactly one character, alone in the scene, with an empty and clean background around them. ';
  } else {
    cenaTexto = 'Transform the people from @image1 and @image2 into chibi kawaii watercolor characters together in the same scene. ';
    cenaTexto += 'Action: ' + acao + '. ';
    cenaTexto += 'Setting: ' + cenario + '. ';
    cenaTexto += refs.join('. ') + '. ';
    cenaTexto += reforcoEscalaV4(parsNaPg);
    // Sess\u00e3o 3 (24/04): constraint positivo para evitar personagem fantasma.
    // Descoberto no teste Beni+Papai (p\u00e1gina 5 gerou menina na cama ao fundo).
    cenaTexto += ' The illustration shows exactly these two characters together, alone in the scene, with an empty and clean background around them. ';
  }

  cenaTexto += 'Full body visible for all characters, including legs and feet. ';
  cenaTexto += 'Soft pastel watercolor children\'s book illustration, chibi proportions with big glossy eyes and rosy cheeks. ';
  cenaTexto += atmosfera + '. ';
  cenaTexto += 'No text, no watermark.';

  return cenaTexto;
}

async function gerarCenaPaginaComRetry(pg, idx){
  // FIX BUG 3: 3 tentativas com backoff exponencial (2s, 5s, 10s)
  var delays=[2000, 5000, 10000];
  for(var tentativa=0;tentativa<3;tentativa++){
    var t0=Date.now();
    try{
      var resultado=await gerarCenaPagina(pg,idx);
      if(resultado.url){
        if(tentativa>0) logGeracao({tipo:'cena',cena_idx:idx,status:'sucesso_retry',tentativa:tentativa+1,duracao_ms:Date.now()-t0});
        return resultado; // sucesso
      }
      logGeracao({tipo:'cena',cena_idx:idx,status:'url_vazia',tentativa:tentativa+1,duracao_ms:Date.now()-t0});
      if(tentativa<2) await new Promise(function(r){setTimeout(r,delays[tentativa]);});
    }catch(e){
      logGeracao({tipo:'cena',cena_idx:idx,status:'exception',tentativa:tentativa+1,erro_msg:(e&&e.message)||'',duracao_ms:Date.now()-t0});
      if(tentativa<2) await new Promise(function(r){setTimeout(r,delays[tentativa]);});
    }
  }
  // v4 (24/04/26): fallback "flux-pro genérico" removido.
  // Motivo: fallback sem foto gera protagonista aleatório (não parece com a criança),
  // pior que entregar erro. Preferimos falhar honestamente para o chamador mostrar
  // "tentar novamente" em vez de entregar cena degradada como sucesso.
  logGeracao({tipo:'cena',cena_idx:idx,status:'falha_final_sem_fallback',erro_msg:'3 tentativas FLUX.2 falharam'});
  return {pg:pg,idx:idx,url:null,erro:true};
}

async function gerarCenaPagina(pg,idx){
  // ══════════════════════════════════════════════════════════════════════════
  // SQUISHBOOK v4 (24/04/26): motor FLUX.2 [pro] edit multi-reference
  // ══════════════════════════════════════════════════════════════════════════
  // Input:  pg={titulo, texto}, idx=número da página
  // Output: {pg, idx, url, erro} — URL da imagem gerada ou null com erro:true
  //
  // Pipeline:
  //   1. Detectar quem aparece na página (preservado da v3)
  //   2. Detectar expressão e ação conjunta (preservado da v3)
  //   3. Extrair cenário via Claude (preservado da v3)
  //   4. Filtrar cenário contra blacklist de composições perigosas (NOVO)
  //   5. Converter fotos originais em data URLs (NOVO — substitui avatar chibi)
  //   6. Montar prompt FLUX.2 com template validado nos 6 testes (NOVO)
  //   7. Chamar fal-ai/flux-2-pro/edit via /api/avatar
  //   8. Retornar {pg, idx, url, erro}
  //
  // Abandonado (vs v3): pipeline pulid+composite, gerarAvatarDalle como
  // pré-requisito, removerFundoViaFal/Branco, compositeComRemocaoFundo.
  // Tudo continua no arquivo como zona morta/fallback documentado.

  var parsNaPg=[];
  var textoCombinadoBusca=(pg.texto||'').toLowerCase()+' '+(pg.titulo||'').toLowerCase();

  // Mapeamento de apelidos/variações (preservado da v3)
  var aliasMap={
    'papai':['papai','pai','papa','daddy','dad','o pai','o papai'],
    'mamae':['mamae','mamãe','mae','mãe','mama','mommy','mom','a mae','a mamae','mamãe'],
    'vovo':['vovo','vovô','vovó','avo','avô','avó','vô','vó','vovó','vovô'],
    'tio':['tio','uncle','o tio'],
    'tia':['tia','aunt','a tia'],
    'irmao':['irmao','irmão','brother','o irmao','o irmão'],
    'irma':['irma','irmã','sister','a irma','a irmã'],
    'primo':['primo','cousin','o primo'],
    'prima':['prima','a prima'],
    'padrinho':['padrinho','godfather','o padrinho'],
    'madrinha':['madrinha','godmother','a madrinha']
  };
  var aliasExtra={};
  for(var ae=0;ae<ST.personagens.length;ae++){
    var pae=ST.personagens[ae];
    if(pae.papel==='protagonista'||!pae.nome) continue;
    var primNome=pae.nome.split(' ')[0].toLowerCase();
    if(primNome.length>=3) aliasExtra[pae.nome.toLowerCase()]=[primNome];
  }

  for(var i=0;i<ST.personagens.length;i++){
    var p=ST.personagens[i];
    if(p.papel==='protagonista'){ parsNaPg.push(p); continue; }
    if(!p.nome) continue;
    if(p.papel==='familiar'||p.papel==='amigo'){ parsNaPg.push(p); continue; }

    var nomeLower=p.nome.toLowerCase();
    var achouNome=textoCombinadoBusca.indexOf(nomeLower)>=0;
    if(!achouNome){
      for(var ak in aliasMap){
        if(nomeLower.indexOf(ak)>=0||ak.indexOf(nomeLower)>=0){
          var aliases=aliasMap[ak];
          for(var ai=0;ai<aliases.length;ai++){
            if(textoCombinadoBusca.indexOf(aliases[ai])>=0){ achouNome=true; break; }
          }
        }
        if(achouNome) break;
      }
    }
    if(!achouNome && aliasExtra[nomeLower]){
      var extAliases=aliasExtra[nomeLower];
      for(var xi=0;xi<extAliases.length;xi++){
        if(textoCombinadoBusca.indexOf(extAliases[xi])>=0){ achouNome=true; break; }
      }
    }
    if(achouNome) parsNaPg.push(p);
  }
  if(parsNaPg.length===0) parsNaPg=[ST.personagens[0]];
  parsNaPg=parsNaPg.filter(function(p,i,arr){return arr.indexOf(p)===i;});

  // ── Limite duro da v4: no máximo 2 personagens VISUAIS na cena ──────────
  // Descoberto nos Testes 4/4B: 3+ personagens causa alucinação.
  // Os demais viram "personagens narrativos" (só no texto) na Sessão 2.
  // Por enquanto, cortamos em 2 e damos prioridade a protagonista + papel familiar.
  if(parsNaPg.length > 2){
    var prot = parsNaPg.filter(function(p){return p.papel==='protagonista';})[0] || parsNaPg[0];
    var outros = parsNaPg.filter(function(p){return p !== prot;});
    // Prioridade: familiar > amigo > outro
    outros.sort(function(a,b){
      var rank={familiar:0, amigo:1, outro:2};
      return (rank[a.papel]||3) - (rank[b.papel]||3);
    });
    parsNaPg = [prot, outros[0]];
  }

  var textoLower=(pg.texto||'').toLowerCase();
  var tituloLower=(pg.titulo||'').toLowerCase();
  var combinado=textoLower+' '+tituloLower;
  var roteiro=ST.roteiro||'aventura';

  // Expressão por página (preservado da v3)
  var expressao='joyful and curious';
  if(combinado.indexOf('assust')>-1||combinado.indexOf('medo')>-1||combinado.indexOf('tremeu')>-1) expressao='scared but brave, wide nervous eyes';
  else if(combinado.indexOf('triste')>-1||combinado.indexOf('chor')>-1) expressao='sad and emotional, teary eyes';
  else if(combinado.indexOf('alegr')>-1||combinado.indexOf('feliz')>-1||combinado.indexOf('sorri')>-1||combinado.indexOf('rindo')>-1) expressao='very happy, big beaming smile';
  else if(combinado.indexOf('corag')>-1||combinado.indexOf('heroi')>-1||combinado.indexOf('determin')>-1) expressao='brave and determined';
  else if(combinado.indexOf('surpres')>-1||combinado.indexOf('espant')>-1||combinado.indexOf('incrivel')>-1) expressao='amazed and surprised';
  else if(combinado.indexOf('dormi')>-1||combinado.indexOf('sonho')>-1) expressao='sleepy and dreamy';
  else if(combinado.indexOf('corr')>-1||combinado.indexOf('brinc')>-1) expressao='excited and playful';
  else if(combinado.indexOf('abraco')>-1||combinado.indexOf('amor')>-1||combinado.indexOf('junto')>-1) expressao='warm and loving';
  if(roteiro==='terror') expressao='scared but curious, wide glowing eyes';

  // Ação conjunta entre personagens (preservado da v3)
  var acaoConjunta='interacting naturally, physically close together in the scene';
  if(parsNaPg.length>=2){
    if(combinado.indexOf('abraco')>-1||combinado.indexOf('abraca')>-1||combinado.indexOf('junto')>-1||combinado.indexOf('apertad')>-1) acaoConjunta='hugging each other warmly, faces close, emotional and tender';
    else if(combinado.indexOf('corr')>-1||combinado.indexOf('brinc')>-1||combinado.indexOf('pula')>-1) acaoConjunta='running and playing together, holding hands, arms wide with joy';
    else if(combinado.indexOf('assust')>-1||combinado.indexOf('medo')>-1||combinado.indexOf('tremeu')>-1) acaoConjunta='one holding the other protectively, both scared';
    else if(combinado.indexOf('descobr')>-1||combinado.indexOf('encontr')>-1||combinado.indexOf('olha')>-1) acaoConjunta='both pointing and looking at something together with wide amazed eyes';
    else if(combinado.indexOf('ajud')>-1||combinado.indexOf('segur')>-1||combinado.indexOf('mao')>-1) acaoConjunta='holding hands, one helping the other forward';
    else if(combinado.indexOf('chora')>-1||combinado.indexOf('lagrima')>-1||combinado.indexOf('triste')>-1) acaoConjunta='one comforting the other with a gentle hand on shoulder';
    else if(combinado.indexOf('celebr')>-1||combinado.indexOf('vitoria')>-1||combinado.indexOf('feliz')>-1) acaoConjunta='both jumping with arms raised in celebration, huge smiles';
    else if(combinado.indexOf('conversa')>-1||combinado.indexOf('fala')>-1||combinado.indexOf('diz')>-1) acaoConjunta='facing each other, one talking expressively, the other listening';
    else acaoConjunta='physically together, clearly interacting, facing each other or touching';
  } else {
    acaoConjunta='in a dynamic pose fitting the scene, expressing ' + expressao;
  }

  // Extrai cenário via Claude (preservado da v3)
  var elementos = await extrairElementosDaCena(pg.texto||'', pg.titulo||'', roteiro, parsNaPg);
  var cenario = elementos.cenario || 'a storybook scene';

  // Filtra cenário contra blacklist (NOVO v4)
  var cenarioOriginal = cenario;
  cenario = filtrarCenarioV4(cenario, parsNaPg.length);
  if(cenario !== cenarioOriginal){
    logGeracao({tipo:'cena',cena_idx:idx,status:'cenario_filtrado_v4',erro_msg:'de: '+cenarioOriginal.substring(0,80)+' -> para: '+cenario.substring(0,80)});
  }

  // Adiciona objetos narrativos ao cenário, se houver
  if(elementos.objetos && elementos.objetos.length>0){
    cenario += '. Also in scene: ' + elementos.objetos.map(function(o){return o.descricao;}).join('; ');
  }

  // Atmosfera por roteiro (preservado da v3)
  var atmosfera;
  if(roteiro==='diadasmaes') atmosfera='warm tender mother and child mood, soft golden afternoon light, pastel pink and lavender hues, blooming flowers';
  else if(roteiro==='terror') atmosfera='spooky mood, deep shadows, eerie moonlight, cute but slightly scary atmosphere';
  else if(roteiro==='aventura') atmosfera='adventurous mood, dramatic golden hour lighting';
  else if(roteiro==='magia') atmosfera='magical enchanted mood, soft glowing sparkles, dreamy pastel mist';
  else if(roteiro==='familia') atmosfera='warm cozy family mood, soft golden indoor lighting';
  else if(roteiro==='amizade') atmosfera='joyful cheerful mood, bright colorful lighting';
  else if(roteiro==='animal') atmosfera='warm natural mood, soft sunlight through trees';
  else if(roteiro==='sonho') atmosfera='dreamy hopeful mood, soft ethereal lighting, gentle pastel glow';
  else atmosfera='warm magical storybook mood, soft colorful lighting';

  // ── Converter fotos originais em data URLs ─────────────────────────────
  // FLUX.2 aceita data URL em image_urls[]. Sem upload intermediário.
  var imageUrls = [];
  for(var k=0; k<parsNaPg.length; k++){
    var pk = parsNaPg[k];
    // Prioridade: foto original > avatar chibi já gerado
    var fonte = pk.fotoUrl || pk.avatarUrl;
    if(!fonte){
      logGeracao({tipo:'cena',cena_idx:idx,status:'sem_foto',erro_msg:'personagem '+pk.nome+' sem fotoUrl nem avatarUrl'});
      continue;
    }
    var dataUrl = await fotoParaDataUrl(fonte);
    if(dataUrl) imageUrls.push(dataUrl);
  }

  if(imageUrls.length === 0){
    logGeracao({tipo:'cena',cena_idx:idx,status:'sem_referencias',erro_msg:'nenhum personagem com foto valida'});
    return {pg:pg, idx:idx, url:null, erro:true};
  }

  // ── Montar prompt FLUX.2 ───────────────────────────────────────────────
  var prompt = construirPromptV4(parsNaPg, cenario, acaoConjunta, expressao, roteiro, atmosfera);

  // ── Chamar FLUX.2 [pro] edit ───────────────────────────────────────────
  var ctrl = new AbortController();
  var tmout = setTimeout(function(){ctrl.abort();}, 150000); // 150s (backend tem retry 3x de 120s cada)
  var t0 = Date.now();

  try{
    var resp = await fetch('https://squishbook-backend-v2.onrender.com/api/avatar', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: MOTOR_V4,
        payload: {
          prompt: prompt,
          image_urls: imageUrls,
          image_size: 'landscape_4_3'
        }
      }),
      signal: ctrl.signal
    });
    clearTimeout(tmout);

    var data = await resp.json();
    var cenaUrl = data.images && data.images[0] && data.images[0].url;

    if(!resp.ok || !cenaUrl){
      logGeracao({
        tipo:'cena', cena_idx:idx, status:'flux2_falhou', modelo:MOTOR_V4,
        duracao_ms:Date.now()-t0,
        erro_msg: (data.erro || 'status '+resp.status+' '+JSON.stringify(data).substring(0,200))
      });
      return {pg:pg, idx:idx, url:null, erro:true};
    }

    logGeracao({
      tipo:'cena', cena_idx:idx, status:'sucesso', modelo:MOTOR_V4,
      duracao_ms:Date.now()-t0, url_gerada:cenaUrl
    });
    return {pg:pg, idx:idx, url:cenaUrl, erro:false};

  }catch(e){
    clearTimeout(tmout);
    console.error('Erro cena '+idx, e && e.message ? e.message : e);
    logGeracao({
      tipo:'cena', cena_idx:idx, status:'flux2_exception', modelo:MOTOR_V4,
      duracao_ms:Date.now()-t0,
      erro_msg:(e && e.message) || String(e)
    });
    return {pg:pg, idx:idx, url:null, erro:true};
  }
}

// ZONA MORTA v3 — funções abaixo não são mais chamadas pela gerarCenaPagina v4
// ════════════════════════════════════════════════════════════════════════════
// Mantidas no arquivo como fallback de emergência caso seja necessário rollback
// para o pipeline pulid+composite. Não remover sem confirmação do Marcelo.
// Log da virada arquitetural: Notion 34c40f17-e82d-8130.
//
// - removerFundoViaFal: usava fal-ai/birefnet-v2 para remover fundo dos avatares
// - removerFundoBranco: fallback manual com flood fill
// - compositeComRemocaoFundo: colava avatares sobre cenário vazio
// ════════════════════════════════════════════════════════════════════════════

// FIX #5 (22/04): remoção de fundo profissional via fal-ai/birefnet-v2.
// Elimina as manchas verdes/marrons nos rostos do Beni que apareciam quando
// caía no composite (flood fill local deixava artefatos em fundos com
// degradê ou cores similares à pele). Retorna canvas pronto pro composite;
// se falhar, chamador faz fallback pra removerFundoBranco local.
async function removerFundoViaFal(imgUrl){
  try{
    var ctrl=new AbortController();
    var tmout=setTimeout(function(){ctrl.abort();},30000);
    var r=await fetch('https://squishbook-backend-v2.onrender.com/api/avatar',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'fal-ai/birefnet-v2',
        payload:{image_url:imgUrl}
      }),
      signal:ctrl.signal
    });
    clearTimeout(tmout);
    if(!r.ok) return null;
    var d=await r.json();
    // birefnet-v2 retorna image.url (singular) ou images[0].url
    var outUrl=(d.image&&d.image.url)||(d.images&&d.images[0]&&d.images[0].url);
    if(!outUrl) return null;
    return new Promise(function(resolve){
      var img=new Image();
      img.crossOrigin='anonymous';
      img.onload=function(){
        var cv=document.createElement('canvas');
        cv.width=img.width; cv.height=img.height;
        cv.getContext('2d').drawImage(img,0,0);
        resolve(cv);
      };
      img.onerror=function(){resolve(null);};
      img.src=outUrl;
    });
  }catch(e){ return null; }
}

// Remove o fundo branco/claro de uma imagem de avatar usando canvas
// Usa flood fill a partir dos 4 cantos para preservar rostos e detalhes internos
async function removerFundoBranco(imgUrl){
  return new Promise(function(resolve){
    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=img.width; canvas.height=img.height;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      var data=ctx.getImageData(0,0,canvas.width,canvas.height);
      var d=data.data;
      var w=canvas.width, h=canvas.height;
      var visited=new Uint8Array(w*h);

      // Detecta cor de fundo amostrando os 4 cantos
      function getPixel(x,y){ var i=(y*w+x)*4; return [d[i],d[i+1],d[i+2]]; }
      var corners=[getPixel(0,0),getPixel(w-1,0),getPixel(0,h-1),getPixel(w-1,h-1)];
      var bgR=Math.round((corners[0][0]+corners[1][0]+corners[2][0]+corners[3][0])/4);
      var bgG=Math.round((corners[0][1]+corners[1][1]+corners[2][1]+corners[3][1])/4);
      var bgB=Math.round((corners[0][2]+corners[1][2]+corners[2][2]+corners[3][2])/4);

      var threshold=35; // tolerância conservadora para preservar bordas

      function isBg(x,y){
        var i=(y*w+x)*4;
        return Math.abs(d[i]-bgR)<threshold &&
               Math.abs(d[i+1]-bgG)<threshold &&
               Math.abs(d[i+2]-bgB)<threshold;
      }

      // Flood fill iterativo a partir dos cantos
      var stack=[];
      function addIfBg(x,y){
        if(x<0||x>=w||y<0||y>=h) return;
        var idx=y*w+x;
        if(!visited[idx]&&isBg(x,y)){ visited[idx]=1; stack.push(x,y); }
      }

      // Semeia a partir de toda a borda da imagem
      for(var x=0;x<w;x++){ addIfBg(x,0); addIfBg(x,h-1); }
      for(var y=0;y<h;y++){ addIfBg(0,y); addIfBg(w-1,y); }

      while(stack.length){
        var cy=stack.pop(); var cx=stack.pop();
        var pi=(cy*w+cx)*4;
        d[pi+3]=0; // torna transparente
        addIfBg(cx+1,cy); addIfBg(cx-1,cy);
        addIfBg(cx,cy+1); addIfBg(cx,cy-1);
      }

      // Suaviza bordas: faz um passe de semi-transparência nas bordas de transição
      for(var by=1;by<h-1;by++){
        for(var bx=1;bx<w-1;bx++){
          var bi=(by*w+bx)*4;
          if(d[bi+3]===255){ // pixel visível
            // Verifica se algum vizinho é transparente (borda)
            var temVizinhoTransp=
              d[((by-1)*w+bx)*4+3]===0 || d[((by+1)*w+bx)*4+3]===0 ||
              d[(by*w+(bx-1))*4+3]===0 || d[(by*w+(bx+1))*4+3]===0;
            if(temVizinhoTransp) d[bi+3]=200; // suaviza borda
          }
        }
      }

      ctx.putImageData(data,0,0);
      resolve(canvas);
    };
    img.onerror=function(){resolve(null);};
    img.src=imgUrl;
  });
}

// Compõe avatares (com remoção de fundo) sobre o cenário
async function compositeComRemocaoFundo(cenarioUrl, avatarPersonagens, totalParsNaPg){
  return new Promise(async function(resolve){
    var canvas=document.createElement('canvas');
    canvas.width=800; canvas.height=600;
    var ctx=canvas.getContext('2d');

    // Carrega cenário
    var cenarioImg=new Image();
    cenarioImg.crossOrigin='anonymous';
    cenarioImg.onload=async function(){
      ctx.drawImage(cenarioImg,0,0,800,600);

      // Overlay leve
      ctx.fillStyle='rgba(0,0,0,0.05)';
      ctx.fillRect(0,0,800,600);

      // Posições e tamanhos por número de personagens
      var posicoes;
      if(avatarPersonagens.length===1){
        posicoes=[{x:260,y:160,w:280,h:380}];
      } else if(avatarPersonagens.length===2){
        // Interação: um pouco voltados um para o outro
        posicoes=[
          {x:100,y:180,w:260,h:360},
          {x:440,y:180,w:260,h:360}
        ];
      } else {
        posicoes=[
          {x:60,y:200,w:220,h:320},
          {x:290,y:180,w:220,h:340},
          {x:520,y:200,w:220,h:320}
        ];
      }

      for(var i=0;i<Math.min(avatarPersonagens.length,posicoes.length);i++){
        var av=avatarPersonagens[i];
        var pos=posicoes[i];

        // FIX #5 (22/04): tenta remoção profissional via fal-ai/birefnet-v2
        // primeiro. Se falhar (timeout, saldo, etc), cai no flood fill local
        // pra não bloquear entrega. O birefnet elimina as manchas verdes/marrons
        // que apareciam nos rostos quando o fundo original tinha cores próximas
        // à pele (rosa/bege).
        var avCanvas=await removerFundoViaFal(av.avatarUrl);
        if(!avCanvas) avCanvas=await removerFundoBranco(av.avatarUrl);
        if(!avCanvas) continue;

        // Sombra suave
        ctx.save();
        ctx.shadowColor='rgba(0,0,0,0.28)';
        ctx.shadowBlur=18;
        ctx.shadowOffsetX=0;
        ctx.shadowOffsetY=10;

        // Mantém aspect ratio
        var ar=avCanvas.width/avCanvas.height;
        var dw=pos.w;
        var dh=dw/ar;
        if(dh>pos.h){dh=pos.h;dw=dh*ar;}
        var dx=pos.x+(pos.w-dw)/2;
        var dy=pos.y+(pos.h-dh);

        ctx.globalCompositeOperation='source-over';
        ctx.drawImage(avCanvas,dx,dy,dw,dh);
        ctx.restore();
      }

      resolve(canvas.toDataURL('image/jpeg',0.92));
    };
    cenarioImg.onerror=function(){resolve(null);};
    cenarioImg.src=cenarioUrl;
  });
}

        model:'claude-sonnet-4-20250514',max_tokens:4000,

function carregarImagem(url){
  return new Promise(function(resolve,reject){
    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      resolve(canvas.toDataURL('image/jpeg',0.85));
    };
    img.onerror=reject;
    img.src=url;
  });
}

async function gerarPDFAutomatico(htmlContent, titulo){
  var btn = event && event.target;
  if(btn){ btn.disabled=true; btn.textContent='⏳ Gerando PDF...'; }
  try{
    var res = await fetch('https://squishbook-backend-v2.onrender.com/api/gerar-pdf', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({html: htmlContent, titulo: titulo||'squishbook'})
    });
    if(!res.ok) throw new Error('Erro '+res.status);
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (titulo||'squishbook').replace(/[^a-z0-9]/gi,'_')+'.pdf';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
    if(btn){ btn.disabled=false; btn.textContent='⬇️ Baixar PDF'; }
  }catch(e){
    // Fallback para window.print() se o backend falhar
    if(btn){ btn.disabled=false; btn.textContent='⬇️ Salvar PDF'; }
    alert('Baixando via impressão do navegador. Na janela que abrir, escolha "Salvar como PDF".');
    window.print();
  }
}

function voltar(){
  // v4-simplificado (26/04): tela 6 (formato/endere\u00e7o) foi removida.
  // Voltar da tela 7 (pagamento) leva direto para a tela 5 (revis\u00e3o).
  if(ST.step===7){ ST.step=5; render(); return; }
  if(ST.step>1){ ST.step--; render(); }
}
